<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wood Apartments — Адмін</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0D;--sf:#161616;--sf2:#1E1E1E;--sf3:#252525;--bd:#2A2A2A;--bd2:#333;--gold:#C9A84C;--gold2:#E8C872;--gdim:#7A6028;--tx:#E8E4DC;--tx2:#A09890;--tx3:#6A6258;--gr:#3D7A5A;--gr-bg:#1A2E22;--r:10px;--rs:6px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto}
.sh{padding:16px 16px 12px;border-bottom:1px solid var(--bd)}
.logo-img{width:100%;max-width:150px;height:auto;display:block;margin:0 auto 10px}
.sh-sub{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.15em;text-align:center}
.srch{padding:10px 12px;border-bottom:1px solid var(--bd)}
.srch input{width:100%;background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:6px 10px;border-radius:var(--rs);font-size:12px;outline:none}
.srch input:focus{border-color:var(--gdim)}
.srch input::placeholder{color:var(--tx3)}
.snav{flex:1;overflow-y:auto;padding:8px 0}
.cb{width:100%;text-align:left;background:none;border:none;color:var(--tx2);padding:8px 16px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:space-between;transition:all .15s;border-left:2px solid transparent}
.cb:hover{background:var(--sf2);color:var(--tx)}
.cb.active{background:var(--sf2);color:var(--gold);border-left-color:var(--gold)}
.cb .cnt{font-size:10px;color:var(--tx3);background:var(--sf3);padding:1px 6px;border-radius:10px}
.sft{padding:12px 16px;border-top:1px solid var(--bd)}
.ebtn{width:100%;background:var(--gdim);border:none;color:var(--gold2);padding:7px;border-radius:var(--rs);cursor:pointer;font-size:11px;transition:background .15s;margin-bottom:6px}
.ebtn:hover{background:#9A7830}
.sst{font-size:11px;color:var(--gdim);text-align:center;min-height:16px}
.tb{display:flex;align-items:center;justify-content:space-between;padding:14px 24px 10px;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.tc{font-family:Georgia,serif;font-size:18px;color:var(--gold)}
.tct{font-size:12px;color:var(--tx3);margin-left:10px}
.stb{display:flex;gap:20px;padding:8px 24px;border-bottom:1px solid var(--bd);background:var(--sf);font-size:11px;color:var(--tx3);flex-shrink:0}
.sv{color:var(--gold);font-weight:500}
.dishes{padding:16px 24px;display:flex;flex-direction:column;gap:2px}
.csep{padding:20px 0 8px;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--tx3);border-bottom:1px solid var(--bd);margin-bottom:4px}
.dc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.dc:hover{border-color:var(--bd2)}
.dc.exp{border-color:var(--gdim)}
.dc.new-item{border-color:var(--gr)}
.new-badge{font-size:9px;background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr);padding:1px 5px;border-radius:3px;display:none;flex-shrink:0}
.new-badge.on{display:inline-block}
.dh{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.dn{font-size:11px;color:var(--tx3);min-width:26px;padding-top:2px;flex-shrink:0}
.di{flex:1;min-width:0}
.dnm{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dbg{font-size:9px;background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr);padding:1px 5px;border-radius:3px;display:none;flex-shrink:0}
.dbg.on{display:inline-block}
.ddesc{font-size:12px;color:var(--tx2);line-height:1.5}
.ddesc.ed{color:var(--gold2)}
.dm{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;padding-left:12px}
.dp{font-size:14px;font-weight:500;color:var(--gold);white-space:nowrap}
.dpe{font-size:11px;color:var(--tx3)}
.dw{font-size:11px;color:var(--tx3);white-space:nowrap}
.da{font-size:11px;color:var(--tx3);transition:transform .2s;margin-top:4px}
.dc.exp .da{transform:rotate(180deg)}
.db{display:none;border-top:1px solid var(--bd)}
.dc.exp .db{display:block}
.pt{display:flex;border-bottom:1px solid var(--bd)}
.ptb{padding:10px 16px;font-size:12px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ptb.active{color:var(--gold);border-bottom-color:var(--gold)}
.pp{display:none;padding:16px}
.pp.active{display:block}
.fl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}
.ne{width:100%;background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:10px 12px;border-radius:var(--rs);font-size:13px;line-height:1.6;resize:vertical;min-height:80px;font-family:inherit;outline:none}
.ne:focus{border-color:var(--gdim)}
.price-row{display:flex;gap:8px;margin-bottom:12px}
.price-input,.weight-input{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:7px 10px;border-radius:var(--rs);font-size:12px;outline:none}
.price-input{width:120px}.weight-input{width:100px}
.price-hint{font-size:11px;color:var(--tx3);margin-top:4px}
.br{display:flex;gap:8px;margin-top:10px}
.sbtn{background:var(--gdim);border:none;color:var(--gold2);padding:7px 16px;border-radius:var(--rs);cursor:pointer;font-size:12px}
.sbtn:hover{background:#9A7830}
.rbtn{background:none;border:1px solid var(--bd2);color:var(--tx3);padding:7px 16px;border-radius:var(--rs);cursor:pointer;font-size:12px}
.rbtn:hover{border-color:var(--tx2);color:var(--tx2)}
.preview-box{margin-top:12px;background:var(--sf3);padding:10px 12px;border-radius:var(--rs);font-size:12px;color:var(--tx2);line-height:1.5;border-left:2px solid var(--gdim)}
.preview-label{font-size:10px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.wblock{margin-bottom:14px}
.wlabel{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gdim);margin-bottom:8px;font-weight:600}
.wtext{font-size:13px;color:var(--tx2);line-height:1.6;background:var(--sf2);padding:12px 14px;border-radius:var(--rs);border-left:3px solid var(--gdim)}
.rtext{font-size:13px;color:var(--tx);line-height:1.6;background:var(--sf3);padding:12px 14px;border-radius:var(--rs);border-left:3px solid var(--gold)}
.empty{padding:40px;text-align:center;color:var(--tx3)}
mark{background:var(--gdim);color:var(--gold2);border-radius:2px;padding:0 2px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}</style>
</head>

var NI=[147,148,149,150,151,152];
var data=R.map(function(r){return{num:r[0],cat:r[1],name:r[2],desc:r[3],price:r[4],weight:r[5],ws:r[6],wr:r[7],ed:null,ep:null,ew:null};});
var cats=[];var seen={};
data.forEach(function(d){if(!seen[d.cat]){seen[d.cat]=1;cats.push(d.cat);}});
var ac="all",sq="";

function isNew(n){return NI.indexOf(n)>=0;}
function fi(){
  return data.filter(function(d){
    var ok=ac==="all"||d.cat===ac;
    if(!sq)return ok;
    var q=sq.toLowerCase();
    var desc=d.ed!==null?d.ed:d.desc;
    return ok&&(d.name.toLowerCase().indexOf(q)>=0||desc.toLowerCase().indexOf(q)>=0);
  });
}
function buildNav(){
  var nav=document.getElementById("nav");nav.innerHTML="";
  var items=[["all","Все меню",data.length]];
  cats.forEach(function(c){items.push([c,c,data.filter(function(d){return d.cat===c;}).length]);});
  items.forEach(function(item){
    var b=document.createElement("button");
    b.className="cb"+(item[0]==="all"?" active":"");
    b.setAttribute("data-cat",item[0]);
    b.innerHTML="<span>"+item[1]+"</span><span class=cnt>"+item[2]+"</span>";
    b.onclick=(function(cat){return function(){selCat(cat);};})(item[0]);
    nav.appendChild(b);
  });
}
function selCat(cat){
  ac=cat;
  document.querySelectorAll(".cb").forEach(function(b){b.classList.toggle("active",b.getAttribute("data-cat")===cat);});
  document.getElementById("tc").textContent=cat==="all"?"Все меню":cat;
  render();
}
function doSearch(q){sq=q;render();}
function eh(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hl(t,q){
  if(!q||!t)return eh(t||"");
  var safe=eh(String(t));
  var idx=safe.toLowerCase().indexOf(q.toLowerCase());
  if(idx<0)return safe;
  return safe.slice(0,idx)+"<mark>"+safe.slice(idx,idx+q.length)+"</mark>"+safe.slice(idx+q.length);
}
function render(){
  var items=fi();
  document.getElementById("tct").textContent=items.length+" позицій";
  var edited=data.filter(function(d){return d.ed!==null||d.ep!==null;}).length;
  var priced=items.filter(function(d){return d.price>0;});
  var avg=priced.length?Math.round(priced.reduce(function(s,d){return s+d.price;},0)/priced.length):0;
  document.getElementById("stb").innerHTML="Позицій: <span class=sv>"+items.length+"</span>&nbsp;&nbsp;&nbsp;Середня ціна: <span class=sv>"+avg+" грн</span>&nbsp;&nbsp;&nbsp;Відредаговано: <span class=sv>"+edited+"</span>";
  document.getElementById("sst").textContent=edited?"Змінено: "+edited+" позицій":"";
  var c=document.getElementById("dishes");c.innerHTML="";
  if(!items.length){c.innerHTML="<div class=empty>Нічого не знайдено</div>";return;}
  var lc=null;
  items.forEach(function(d){
    if(d.cat!==lc){var s=document.createElement("div");s.className="csep";s.textContent=d.cat;c.appendChild(s);lc=d.cat;}

function mkCard(d){
  var card=document.createElement("div");

    +"</div>"
    +"<div class=db>"
      +"<div class=pt>"
        +"<div class=\"ptb active\" onclick=\"sp("+d.num+",0)\">Опис для меню</div>"
        +"<div class=ptb onclick=\"sp("+d.num+",1)\">Картка офіціанта</div>"
      +"</div>"

        +"<textarea class=ne id=\"ed"+d.num+"\" rows=4>"+eh(cur)+"</textarea>"

function upP(n){

function sv(n){
  var d=data.find(function(x){return x.num===n;});

  if(dd){dd.textContent=d.ed;dd.className="ddesc ed";}

  document.getElementById("sst").textContent="Змінено: "+data.filter(function(x){return x.ed!==null||x.ep!==null;}).length+" позицій";

function rv(n){
  var d=data.find(function(x){return x.num===n;});d.ed=null;
  var ta=document.getElementById("ed"+n);if(ta)ta.value=d.desc;

function exportCSV(){
  var rows=[["No","Kategoriya","Nazva","Opys","Tsina","Vaha","Pro stravu","Rekomenduyemo do"]];
  data.forEach(function(d){rows.push([d.num,d.cat,d.name,d.ed!==null?d.ed:d.desc,d.ep!==null?d.ep:d.price,d.ew!==null?d.ew:d.weight,d.ws,d.wr]);});
  var csv=rows.map(function(r){return r.map(function(v){var s=String(v||"");return (s.indexOf(",")>=0||s.indexOf("\n")>=0)?"\""+s.replace(/\"/g,"\"\"")+"\"":s;}).join(",");}).join("\n");
  var a=document.createElement("a");

}
