л. Трохи гіркіший за чистий апельсиновий.","Якщо гість вже замовляв апельсиновий або питає щось менш солодке — рекомендуйте цей варіант. Уточніть що є легка гіркуватість від грейпфруту."],[146,"Фреші","Грейпфрутовий фреш","Свіжовіджатий грейпфрутовий сік — нарингінін у грейпфруті дає стійку приємну гіркуватість і тонізуючий ефект. 250 мл.",160,"250 мл","Свіжовіджатий грейпфрутовий сік. 250мл. Виражена гіркуватість.","Уточніть у гостя чи любить він грейпфрут — смак специфічний і подобається не всім. Якщо так — рекомендуйте. Пропонуйте тим хто просить щось без солодкого."],[147,"Закуски","Сирні кульки","Крем-сир, цибуля, зелень, паніровка — хрустка паніровка, гарячий вершковий крем-сир з цибулею і зеленню всередині, що додають свіжу ноту в начинці.",0,"—","Смажені у фритюрі кульки з крем-сиром, цибулею і зеленню. Зовні хрустять, всередині гарячий тягучий сир. Подаються одразу — швидко охолоджуються.","Хороша закуска до наших фірмових настоянок або крафтового пива. Якщо за столом компанія і вони тільки замовляють алкоголь — пропонуйте як перший снек на стіл. Нагадайте гостю що їсти поки гарячі — холодними вже не те."]];
const NEW_ITEMS=new Set([147]);
const data=R.map(r=>({num:r[0],cat:r[1],name:r[2],desc:r[3],price:r[4],weight:r[5],ws:r[6],wr:r[7],ed:null,ep:null,ew:null}));
const cats=[...new Set(data.map(d=>d.cat))];
let ac='all',sq='';

function fi(){
  return data.filter(d=>{
    const ok=ac==='all'||d.cat===ac;
    if(!sq)return ok;
    const q=sq.toLowerCase();
    return ok&&(d.name.toLowerCase().includes(q)||(d.ed!==null?d.ed:d.desc).toLowerCase().includes(q));
  });
}

function buildNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  [['all','Все меню',data.length],...cats.map(c=>[c,c,data.filter(d=>d.cat===c).length])].forEach(([cat,label,cnt])=>{
    const b=document.createElement('button');
    b.className='cb'+(cat==='all'?' active':'');b.dataset.cat=cat;
    b.innerHTML='<span>'+label+'</span><span class="cnt">'+cnt+'</span>';
    b.onclick=()=>selCat(cat);nav.appendChild(b);
  });
}

function selCat(cat){
  ac=cat;
  document.querySelectorAll('.cb').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  document.getElementById('tc').textContent=cat==='all'?'Все меню':cat;
  render();
}

function doSearch(q){sq=q;render();}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hl(t,q){
  if(!q||!t)return eh(t||'');
  const re=new RegExp('('+q.replace(/[.*+?^${}()|\[\]\\]/g,'\$&')+')','gi');
  return eh(t).replace(re,'<mark>$1</mark>');
}

function render(){
  const items=fi();
  document.getElementById('tct').textContent=items.length+' позицій';
  const edited=data.filter(d=>d.ed!==null||d.ep!==null).length;
  const priced=items.filter(d=>d.price>0);
  const avg=priced.length?Math.round(priced.reduce((s,d)=>s+d.price,0)/priced.length):0;
  document.getElementById('stb').innerHTML=
    'Позицій: <span class="sv">'+items.length+'</span>&nbsp;&nbsp;&nbsp;'+
    'Середня ціна: <span class="sv">'+avg+' грн</span>&nbsp;&nbsp;&nbsp;'+
    'Відредаговано: <span class="sv">'+edited+'</span>';
  document.getElementById('sst').textContent=edited?'Змінено: '+edited+' позицій':'';
  const c=document.getElementById('dishes');c.innerHTML='';
  if(!items.length){c.innerHTML='<div class="empty">Нічого не знайдено</div>';return;}
  let lc=null;
  items.forEach(d=>{
    if(d.cat!==lc){
      const s=document.createElement('div');s.className='csep';s.textContent=d.cat;c.appendChild(s);lc=d.cat;
    }
    c.appendChild(mkCard(d));
  });
}

function mkCard(d){
  const card=document.createElement('div');
  const isNew=NEW_ITEMS.has(d.num);
  card.className='dc'+(isNew?' new-item':'');card.id='c'+d.num;
  const cur=d.ed!==null?d.ed:d.desc;
  const ie=d.ed!==null;
  const curP=d.ep!==null?d.ep:d.price;
  const curW=d.ew!==null?d.ew:d.weight;
  const priceDisplay=curP>0?curP+' грн':'<span style="color:var(--tx3);font-size:12px">ціна не вказана</span>';

  card.innerHTML=
    '<div class="dh" onclick="tog('+d.num+')">'
      +'<span class="dn">#'+d.num+'</span>'
      +'<div class="di">'
        +'<div class="dnm">'+hl(d.name,sq)
          +(isNew?' <span class="new-badge">НОВА</span>':'')
          +' <span class="dbg'+(ie?' on':'')+'" id="bg'+d.num+'">змінено</span></div>'
        +'<div class="ddesc'+(ie?' ed':'')+'" id="dd'+d.num+'">'+hl(cur,sq)+'</div>'
      +'</div>'
      +'<div class="dm"><span class="dp">'+priceDisplay+'</span><span class="dw">'+curW+'</span><span class="da">▾</span></div>'
    +'</div>'
    +'<div class="db">'
      +'<div class="pt">'
        +'<div class="ptb active" onclick="sp('+d.num+',0)">Опис для меню</div>'
        +'<div class="ptb" onclick="sp('+d.num+',1)">Картка офіціанта</div>'
      +'</div>'
      +'<div class="pp active" id="p0-'+d.num+'">'
        +'<div class="preview-box" style="margin:0">'+eh(cur)+'</div>'
      +'</div>'
      +'<div class="pp" id="p1-'+d.num+'">'
        +(d.ws?'<div class="wblock"><div class="wlabel">Про страву</div><div class="wtext">'+eh(d.ws)+'</div></div>':'')
        +(d.wr?'<div class="wblock"><div class="wlabel">Рекомендуємо до</div><div class="rtext">'+eh(d.wr)+'</div></div>':'')
      +'</div>'
    +'</div>';

  const ta=card.querySelector('#ed'+d.num);
  const pv=card.querySelector('#pv'+d.num);
  if(ta&&pv) ta.addEventListener('input',()=>{pv.textContent=ta.value;});
  return card;
}

function tog(n){document.getElementById('c'+n).classList.toggle('exp');}
function sp(n,idx){
  [0,1].forEach(i=>{
    document.getElementById('p'+i+'-'+n).classList.toggle('active',i===idx);
    document.querySelectorAll('#c'+n+' .ptb')[i].classList.toggle('active',i===idx);
  });
}

function upPrice(n){
  const d=data.find(x=>x.num===n);
  const v=parseInt(document.getElementById('pi'+n).value)||0;
  d.ep=v;
  const dp=document.querySelector('#c'+n+' .dp');
  if(dp)dp.innerHTML=v>0?v+' грн':'<span style="color:var(--tx3);font-size:12px">ціна не вказана</span>';
}

function upWeight(n){
  const d=data.find(x=>x.num===n);
  const v=document.getElementById('wi'+n).value.trim();
  d.ew=v||'—';
  const dw=document.querySelector('#c'+n+' .dw');
  if(dw)dw.textContent=d.ew;
}

// view mode — editing disabled

buildNav();render();
// Прокручуємо до нової позиції при старті
setTimeout(()=>{
  const el=document.getElementById('c147');
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('exp');}
},300);
</script>
