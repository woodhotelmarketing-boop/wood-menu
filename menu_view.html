<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wood Apartments — Меню для офіціантів</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--sf:#161616;--sf2:#1E1E1E;--sf3:#252525;
  --bd:#2A2A2A;--bd2:#333;
  --gold:#C9A84C;--gold2:#E8C872;--gdim:#7A6028;
  --tx:#E8E4DC;--tx2:#A09890;--tx3:#6A6258;
  --gr:#3D7A5A;--gr-bg:#1A2E22;
  --r:10px;--rs:6px;
}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto}
.sh{padding:20px 16px 12px;border-bottom:1px solid var(--bd)}
.sl{font-family:Georgia,serif;font-size:15px;color:var(--gold);letter-spacing:.05em;line-height:1.3}
.ss{font-size:11px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.1em}
.srch{padding:10px 12px;border-bottom:1px solid var(--bd)}
.srch input{width:100%;background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:6px 10px;border-radius:var(--rs);font-size:12px;outline:none}
.srch input:focus{border-color:var(--gdim)}
.srch input::placeholder{color:var(--tx3)}
.snav{flex:1;overflow-y:auto;padding:8px 0}
.cb{width:100%;text-align:left;background:none;border:none;color:var(--tx2);padding:8px 16px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:space-between;transition:all .15s;border-left:2px solid transparent}
.cb:hover{background:var(--sf2);color:var(--tx)}
.cb.active{background:var(--sf2);color:var(--gold);border-left-color:var(--gold)}
.cb .cnt{font-size:10px;color:var(--tx3);background:var(--sf3);padding:1px 6px;border-radius:10px}
.sft{padding:12px 16px;border-top:1px solid var(--bd)}

.sst{font-size:11px;color:var(--gdim);text-align:center;min-height:16px}
.tb{display:flex;align-items:center;justify-content:space-between;padding:14px 24px 10px;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;gap:12px}
.tc{font-family:Georgia,serif;font-size:18px;color:var(--gold)}
.tct{font-size:12px;color:var(--tx3)}
.stb{display:flex;gap:20px;padding:8px 24px;border-bottom:1px solid var(--bd);background:var(--sf);font-size:11px;color:var(--tx3);flex-shrink:0}
.sv{color:var(--gold);font-weight:500}
.dishes{padding:16px 24px;display:flex;flex-direction:column;gap:2px}
.csep{padding:20px 0 8px;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--tx3);border-bottom:1px solid var(--bd);margin-bottom:4px}
.dc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.dc:hover{border-color:var(--bd2)}
.dc.exp{border-color:var(--gdim)}
.dc.new-item{border-color:var(--gr);box-shadow:0 0 0 1px var(--gr-bg)}
.new-badge{font-size:9px;background:#1A3A2A;color:#5DBB8A;border:1px solid #3D7A5A;padding:1px 6px;border-radius:3px;flex-shrink:0}
.dh{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.dn{font-size:11px;color:var(--tx3);min-width:26px;padding-top:2px;flex-shrink:0}
.di{flex:1;min-width:0}
.dnm{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dbg{font-size:9px;background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr);padding:1px 5px;border-radius:3px;display:none;flex-shrink:0}
.dbg.on{display:inline-block}
.ddesc{font-size:12px;color:var(--tx2);line-height:1.5}
.ddesc.ed{color:var(--gold2)}
.dm{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;padding-left:12px}
.dp{font-size:14px;font-weight:500;color:var(--gold);white-space:nowrap}
.dw{font-size:11px;color:var(--tx3);white-space:nowrap}
.da{font-size:11px;color:var(--tx3);transition:transform .2s;margin-top:4px}
.dc.exp .da{transform:rotate(180deg)}
.db{display:none;border-top:1px solid var(--bd)}
.dc.exp .db{display:block}
.pt{display:flex;border-bottom:1px solid var(--bd)}
.ptb{padding:10px 16px;font-size:12px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ptb.active{color:var(--gold);border-bottom-color:var(--gold)}
.pp{display:none;padding:16px}
.pp.active{display:block}
.fl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}
.ne{width:100%;background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:10px 12px;border-radius:var(--rs);font-size:13px;line-height:1.6;resize:vertical;min-height:80px;font-family:inherit;outline:none;transition:border-color .15s}
.ne:focus{border-color:var(--gdim)}
.price-row{display:flex;gap:8px;margin-bottom:12px}
.price-input{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:7px 10px;border-radius:var(--rs);font-size:13px;outline:none;width:120px}
.price-input:focus{border-color:var(--gdim)}
.weight-input{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:7px 10px;border-radius:var(--rs);font-size:13px;outline:none;width:100px}
.weight-input:focus{border-color:var(--gdim)}
.br{display:flex;gap:8px;margin-top:10px}
.sbtn{background:var(--gdim);border:none;color:var(--gold2);padding:7px 16px;border-radius:var(--rs);cursor:pointer;font-size:12px;transition:background .15s}
.sbtn:hover{background:#9A7830}
.rbtn{background:none;border:1px solid var(--bd2);color:var(--tx3);padding:7px 16px;border-radius:var(--rs);cursor:pointer;font-size:12px;transition:all .15s}
.rbtn:hover{border-color:var(--tx2);color:var(--tx2)}
.preview-box{margin-top:12px;background:var(--sf3);padding:10px 12px;border-radius:var(--rs);font-size:12px;color:var(--tx2);line-height:1.5;border-left:2px solid var(--gdim)}
.preview-label{font-size:10px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.wblock{margin-bottom:16px}
.wlabel{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gdim);margin-bottom:8px;font-weight:600}
.wtext{font-size:13px;color:var(--tx2);line-height:1.6;background:var(--sf2);padding:12px 14px;border-radius:var(--rs);border-left:3px solid var(--gdim)}
.rtext{font-size:13px;color:var(--tx);line-height:1.6;background:var(--sf3);padding:12px 14px;border-radius:var(--rs);border-left:3px solid var(--gold)}
.price-hint{font-size:11px;color:var(--tx3);margin-top:4px}
.empty{padding:40px;text-align:center;color:var(--tx3)}
mark{background:var(--gdim);color:var(--gold2);border-radius:2px;padding:0 2px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sh"><div class="sl">Wood Apartments</div><div class="ss">Меню закладу</div></div>
  <div class="srch"><input type="text" id="srch" placeholder="Пошук страви або інгредієнта..." oninput="doSearch(this.value)"></div>
  <nav class="snav" id="nav"></nav>
  <div class="sft">
    
    
  </div>
</aside>
<div class="main">
  <div class="tb">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="tc" id="tc">Все меню</span>
      <span class="tct" id="tct"></span>
    </div>
  </div>
  <div class="stb" id="stb"></div>
  <div class="content"><div class="dishes" id="dishes"></div></div>
</div>
</div>
<script>
const R=[[1,"Піца","Піца «Маргарита»","Томатний соус, моцарела, пармезан — пармезан дає солону глибину, моцарела тягнеться.",300,"300 г","Класична тонка піца на томатному соусі з моцарелою і пармезаном. Нічого зайвого — тісто хрустке по краях, сир добре тягнеться.","Якщо гість не може визначитись або хоче щось нейтральне — це безпрограшний варіант. Добре підходить як друга піца на компанію. До неї рекомендуйте бокал легкого білого вина або авторський коктейль на цитрусовій основі."],[2,"Піца","Піца «Курка з грибами»","Куряче філе, моцарела, пармезан, печериці, помідор, вершковий соус — вершкова основа пом'якшує смак грибів, сир дає щільний тягучий шар.",450,"300 г","Вершкова піца з курячим філе і печерицями — соус вершковий, не томатний. Моцарела і пармезан дають щільний сирний шар. Добре запечена, соковита всередині.","Гарно заходить тим, хто уникає томату або хоче щось більш ситне. Якщо гість вагається між піцою і основною стравою — рекомендуйте цю. До неї підійде біле вино або наша настоянка на травах."],[3,"Піца","Піца «Курка з ананасами»","Куряче філе, ананас, моцарела, помідор, пармезан, вершковий соус — ананас при запіканні карамелізується і дає солодку кислинку на тлі ніжного вершкового соусу.",450,"300 г","Піца з курячим філе і шматочками ананасу на вершковому соусі. Смак солодко-кислий, ананас карамелізується при запіканні.","Пропонуйте тим, хто відкрито запитує щось нестандартне або вже замовляв класику раніше. Гостям, які не їдять солодке в їжі — не пропонуйте. До неї добре підійде авторський коктейль на основі тропічних фруктів."],[4,"Піца","Піца «М'ясна»","Томатний соус, моцарела, пепероні, куряче філе, бекон, каперси, пармезан, фіолетова цибуля — пепероні дає копчену гостроту, бекон солоний жир, каперси балансують м'ясний смак кислинкою.",520,"300 г","Найбільш м'ясна піца в меню — пепероні, куряче філе і бекон на томатному соусі. Каперси дають кислинку. Щільна, ситна, гостра.","Рекомендуйте тим, хто хоче щось насичене і м'ясне. Якщо за столом замовляють пиво — це найкраща піца до нього. Також добре закривається нашими фірмовими настоянками."],[5,"Піца","Піца «Сирна»","Моцарела, дорблю, сулугуні, камамбер, пармезан, вершковий соус — чотири сири дають різні рівні смаку: від ніжного молочного до різкої пліснявової нотки дорблю.",450,"300 г","Піца на чотирьох сирах — моцарела, дорблю, сулугуні, камамбер. Вершкова основа, без томату. Смак складний, дорблю дає виражену пікантну ноту.","Питайте гостя чи любить він блакитний сир — дорблю тут добре відчувається. Якщо так — рекомендуйте впевнено. До неї найкраще підійде червоне вино. Гарно береться як спільна закуска на двох."],[6,"Піца","Піца «Карбонара»","Бекон, моцарела, пармезан, вершковий соус, куряче яйце — яйце запікається прямо на тісті і утворює кремову текстуру, бекон дає копчений солоний акцент.",450,"300 г","Піца натхненна класичною карбонарою — бекон, яйце і пармезан на вершковій основі. Яйце запікається прямо на тісті і дає кремову текстуру.","Якщо гість любить карбонару в пасті — запропонуйте це як альтернативу. Ситна, закриває потребу в основній страві. До неї підійде бокал білого вина або пиво."],[7,"Піца","Піца «Пепероні»","Моцарела, томатний соус, перець халапеньйо, пепероні, пармезан — халапеньйо дає рослинну гостроту, пепероні копчений жирний смак із затяжним теплом.",450,"300 г","Гостра піца з пепероні і халапеньйо. Томатний соус, моцарела і пармезан. Гострота відчувається виразно і тримається.","Обов'язково уточніть у гостя чи він їсть гостре — халапеньйо тут не декоративний. Якщо так — рекомендуйте впевнено. До неї найкраще підійде пиво, краще темне або крафтове."],[8,"Піца","Піца «Баварська»","Мисливські ковбаски, моцарела, солоний огірок, болгарський перець, халапеньйо, фіолетова цибуля, томатний соус — ковбаски дають димний присмак, огірок і халапеньйо — кислинку і гостроту в фіналі.",420,"300 г","Піца з мисливськими ковбасками, корнішонами і халапеньйо на томатному соусі. Смак димний, кислий і пікантний одночасно.","Дуже добре заходить до пива — якщо гість замовляє пиво, це перший варіант що варто запропонувати. Також підійде до наших фірмових настоянок. Уточніть про гостре перед замовленням."],[9,"Піца","Піца «Морепродукти»","Вершковий соус, моцарела, креветки, кальмари, мідії, лимон, шпинат, пармезан — мідії дають морську солоність, кальмар ніжну текстуру, вершковий соус зв'язує морепродукти в єдиний смак.",490,"300 г","Піца з морепродуктами — креветки, кальмари, мідії на вершковому соусі з моцарелою і пармезаном. Шпинат і лимон дають свіжість. Легша за м'ясні варіанти.","Якщо гість вже замовив щось морське або питає про рибу — згадайте цю піцу. Добре підходить тим, хто хоче піцу але уникає важкого м'яса. До неї рекомендуйте біле вино або авторський коктейль на цитрусовій основі."],[10,"Піца","Піца «Селянська»","Томатний соус, бекон, мариновані печериці, корнішони, фіолетова цибуля, часник конфі, моцарела, пармезан — часник конфі дає солодкуватий карамельний фон, мариновані печериці кислинку, бекон копчену насиченість.",390,"635 г","Велика піца — 635г. Бекон, мариновані печериці, часник конфі і корнішони на томатному соусі з моцарелою. Ситна, з вираженим димним і кислим смаком.","Гарний вибір для двох або як основна страва для одного з хорошим апетитом. Якщо за столом замовляють пиво або настоянки — ця піца добре закривається з обома."],[11,"Піца","Піца з салямі та сиром Дорблю","Томатний соус, салямі Мілано, сир дорблю, фіолетова цибуля, пармезан — дорблю дає різку пліснявову ноту, салямі щільний ферментований смак із паприковим відтінком.",450,"300 г","Піца з салямі Мілано і сиром дорблю. Томатний соус, фіолетова цибуля, пармезан. Смак насичений, пікантний — дорблю тут добре відчувається.","Питайте чи гість їсть блакитний сир перед тим як рекомендувати. Якщо так — це дуже виграшна комбінація. До неї найкраще підійде червоне вино."],[12,"Піца","Хачапурі по-аджарськи","Бринза, адигейський сир, сулугуні, вершкове масло, куряче яйце — три сири дають різні рівні солоності, яйце при запіканні зв'язує начинку у кремову масу. Подається з напоєм на вибір.",320,"430 г","Хачапурі по-аджарськи — тісто у формі човника, всередині три види сиру, яйце і вершкове масло. Подається гарячим з напоєм на вибір. Сир тягнеться, яйце напіврідке.","Популярна позиція, часто беруть замість основної страви. Нагадайте гостю що йде з напоєм — нехай обирає одразу. Добре підходить до наших фірмових настоянок або до чаю."],[13,"Піца","Хачапурі по-мегрельськи","Сулугуні, яйце, вершкове масло — сулугуні при нагріванні стає тягучим і дає виражений молочний аромат з легкою кислинкою.",210,"490 г","Хачапурі по-мегрельськи з сулугуні — великий круглий, сир і зверху і всередині. Порція 490г, дуже ситне. Тісто м'яке, сир тягнеться.","Найбільша і найсирніша позиція серед хачапурі. Якщо гість хоче щось ситне і любить сир — рекомендуйте впевнено. До нього підійде чай або наші настоянки."],[14,"Піца","Хачапурі по-імеретинськи","Три види сирів, яйце, вершкове масло — шаровий смак від ніжного молочного до більш солоного і щільного. Подається з напоєм на вибір.",320,"320 г","Хачапурі по-імеретинськи — закрите, круглої форми, три види сирів всередині. Подається з напоєм на вибір. М'яке тісто, рівномірна сирна начинка.","Якщо гість хоче спробувати хачапурі але не знає яке — це найбезпечніший вибір. Нагадайте що йде з напоєм. До нього добре підійдуть наші настоянки."],[15,"Піца","Кубдарі","Баранина, телятина — баранина дає жирну насиченість, телятина легшу м'ясну ноту, разом утворюють щільну соковиту начинку. Подається з напоєм на вибір.",350,"245 г","Кубдарі — закрите хачапурі з м'ясною начинкою з баранини і телятини. Подається з напоєм на вибір. По суті це м'ясний пиріг, не сирний.","Якщо гість не їсть багато сиру але хоче спробувати грузинську випічку — це його варіант. Нагадайте про напій. До нього добре підходять настоянки або червоне вино."],[16,"Перші страви","Борщ","Куряче філе, квасоля, сало, чорний хліб, пампушка, сметана — сало і кістковий бульйон дають насиченість, квасоля щільність, буряк натуральну кислинку.",380,"600 г","Борщ на кістковому бульйоні — густий, темний, з квасолею і салом. Подається з пампушкою і сметаною. Порція велика — 600г.","Якщо гість хоче першу страву і не може визначитись — рекомендуйте борщ, не помилитесь. Це найпопулярніша перша страва. Рекомендуємо смакувати з нашим сетом фірмових настоянок або темним пивом."],[17,"Перші страви","Зелений борщ з кропивою","Кропива, щавель, шпинат, картопля, куряче яйце, шматочки м'яса, сметана — щавель дає виражену кислинку, кропива трав'яну гіркуватість, яйце пом'якшує бульйон.",190,"400 г","Зелений борщ зі щавлем, кропивою і шпинатом. Подається зі сметаною. Легший і кисліший за класичний, порція 400г.","Пропонуйте тим, хто хоче щось легше за класичний борщ або питає про сезонні страви. Добре підходить у теплу пору. До нього — наші настоянки на травах або біле вино."],[18,"Перші страви","Бограч","Яловичина, свинина, копчене ребро — копчене ребро дає димний фон всьому бульйону, яловичина щільність, свинина жирну насиченість.",360,"400 г","Бограч — карпатський густий суп з яловичиною, свининою і копченим ребром. Насичений, ситний, з димним присмаком. Порція 400г.","Якщо гість хоче щось дуже ситне і насичене — це найкращий вибір серед перших страв. Добре закривається фірмовими настоянками або темним пивом. Питають часто що це таке — поясніть що це карпатський аналог гуляшу."],[19,"Перші страви","Шурпа","Баранина, картопля, морква, цибуля, болгарський перець, помідор, корінь селери, яловичина, чорний хліб — баранина дає характерний жирний навар, корінь селери пряну землисту ноту, болгарський перець солодкість.",220,"400/70 г","Шурпа — прозорий бульйон з баранини з овочами і шматком яловичини. Порція 400г, подається з чорним хлібом. Смак характерний, баранина відчувається виразно.","Питайте гостя чи їсть він баранину — смак специфічний і подобається не всім. Якщо так — рекомендуйте впевнено. До шурпи добре підходять наші настоянки або чай."],[20,"Перші страви","Вєтнамський суп Фо Бо","Яловичина, яєчна локшина, фіолетова цибуля, зелена цибуля, кінза, перець чилі, гострий соус — яловичий бульйон дає насичену основу, кінза і перець чилі свіжу пряну ноту в фіналі.",190,"450 г","Фо Бо — в'єтнамський суп з яловичиною і яєчною локшиною. Прозорий насичений бульйон, кінза і перець чилі. Порція 450г, подається гарячим.","Популярний вибір у тих хто любить азіатську кухню. Якщо гість питає щось нетипове серед перших — пропонуйте. Гострота регулюється — уточніть. До нього підійде наше крафтове пиво або авторський коктейль."],[21,"Перші страви","Цибулевий крем-суп","Вершки, сир пармезан, грінки — карамелізована цибуля дає солодкість і глибину, пармезан солону кремовість, вершки оксамитову текстуру.",230,"380 г","Цибулевий крем-суп з карамелізованою цибулею, вершками і пармезаном. Подається з грінками. Оксамитова текстура, глибокий солодкуватий смак.","Якщо гість хоче щось вишукане серед перших страв — це найкращий вибір. Популярний на романтичних вечерях і ділових обідах. До нього рекомендуйте біле вино або авторський коктейль."],[22,"Перші страви","Гарбузовий крем-суп","Гарбуз, вершки, цибуля порей, стебло селери, морква, помідор, часник, насіння гарбуза, крутон — гарбуз при запіканні концентрує цукри і дає солодкуватий смак, цибуля порей додає м'яку цибулеву ноту.",230,"365/30 г","Гарбузовий крем-суп з цибулею порей і вершками. Подається з насінням гарбуза і крутоном. Порція 365г, легкий і ніжний.","Якщо гість хоче щось легке і некалорійне серед перших — пропонуйте це. Добре заходить у холодну пору. До нього підійде біле вино або авторський коктейль на рослинній основі."],[23,"Перші страви","Гарбузовий крем-суп з креветкою","Гарбуз, вершки, цибуля порей, стебло селери, морква, помідор, часник, креветка, грісіні — креветка дає йодисту морську ноту і щільну текстуру на тлі солодкуватого гарбузового крему.",260,"330 г","Гарбузовий крем-суп з тигровою креветкою і грісіні. Та сама вершкова основа але з морським акцентом. Порція 330г.","Якщо гість вже пробував базовий гарбузовий або хоче щось з морепродуктами серед перших — це логічний апсейл. До нього рекомендуйте біле вино або ігристе."],[24,"Перші страви","Грибний крем-суп","Білі гриби, курячий бульйон, вершки, молоко, цибуля, часник, картопля, крутон — білі гриби дають насичений лісовий умамі, вершки жирну оксамитовість, часник пряну ноту в основі.",230,"350/30 г","Грибний крем-суп на основі білих грибів і курячого бульйону з вершками. Подається з крутоном. Щільна текстура, виражений грибний аромат.","Якщо гість любить гриби — рекомендуйте впевнено. Один з найбільш ароматних супів меню. До нього добре підходить біле вино або наші трав'яні настоянки."],[25,"Перші страви","Грибна юшка","Гриб білий, гриб ерінг, гриб шитакі, шампіньйони, цибуля порей, картопля, морква, часник, гречана лапша, кріп, петрушка, болгарський перець — ерінг дає м'ясисту текстуру, шитакі деревний умамі, гречана лапша горіховий присмак.",240,"350 г","Грибна юшка з чотирьох видів грибів — білий, ерінг, шитакі і шампіньйони. На відміну від крем-супу — з гречаною лапшою і шматочками грибів. Порція 350г.","Якщо гість хоче щось більш щільне за текстурою ніж крем-суп — пропонуйте юшку. Гарний вибір для тих хто уникає вершків. До неї підійде біле вино або трав'яна настоянка."],[26,"Перші страви","Шпинатний крем-суп","Шпинат, курячий бульйон, вершки, насіння соняшника — шпинат дає рослинну свіжість і легку гіркуватість, насіння соняшника хрустку горіхову ноту зверху.",230,"350 г","Шпинатний крем-суп на курячому бульйоні з вершками. Яскраво-зелений, легкий. Зверху насіння соняшника для текстури. Порція 350г.","Рекомендуйте тим хто стежить за харчуванням або просить щось легке. Популярний серед гостей які уникають важкого. До нього підійде біле вино або безалкогольний коктейль."],[27,"Перші страви","Бульйон з курячим філе","Курячий бульйон, локшина, морква, перепелине яйце, куряче філе, кріп, петрушка — довго варений бульйон дає прозору насиченість, перепелине яйце ніжну кремову текстуру. Подається з курячим паштетом і чорним хлібом.",210,"500 г","Прозорий курячий бульйон з локшиною, морквою і перепелиним яйцем. Подається з курячим паштетом і чорним хлібом окремо. Порція 500г — вже повноцінна страва.","Якщо гість хоче щось легке або погано почувається — це найкращий вибір. Нагадайте що йде з паштетом і хлібом — це включено. До нього підійде чай або трав'яна настоянка."],[28,"Салати","Салат грецький","Мікс салату, огірки, болгарський перець, помідор, сир фета, фіолетова цибуля, оливкова олія, маслини — фета дає солону кислинку, оливкова олія фруктову жирність, маслини гіркуватий присмак.",270,"250 г","Класичний грецький салат з фетою, маслинами і оливковою олією. Без заправки на основі майонезу. Свіжий, легкий, порція 250г.","Якщо гість просить щось легке або вегетаріанське — це перший варіант що варто запропонувати. Добре підходить як доповнення до основної страви. До нього рекомендуйте біле вино або авторський коктейль."],[29,"Салати","Цезар з куркою","Ромен, айсберг, курка гриль, перепелине яйце, помідор черрі, чіпси з бекону, пармезан, чіпси з чіабати, соус Цезар — курка гриль дає димний м'ясний смак, чіпси з бекону хрускіт і солоність, соус Цезар кислу кремовість.",350,"250 г","Цезар з куркою гриль — ромен, айсберг, пармезан, чіпси з бекону і соус Цезар. Подається з чіпсами з чіабати. Порція 250г, ситний.","Найбільш популярний салат — якщо гість не може визначитись серед салатів, рекомендуйте цей. Добре закривається як основна страва на обід. До нього підійде біле вино або крафтове пиво."],[30,"Салати","Цезар з лососем","Ромен, айсберг, лосось слабосолений, перепелине яйце, помідор черрі, пармезан, чіпси з чіабати, соус Цезар — слабосолений лосось дає жирну морську ніжність замість м'ясного акценту курки.",390,"250 г","Цезар з лососем — та сама основа що і з куркою але замість курки слабосолений лосось. Порція 250г, більш делікатний смак.","Якщо гість вже пробував Цезар з куркою або просить щось з рибою — пропонуйте цей варіант. Природний апсейл. До нього рекомендуйте біле вино або ігристе."],[31,"Салати","Гриль-салат з яловичиною","Мікс салату, печериці, кабачок, помідор черрі, болгарський перець, яловича вирізка, гірчично-медовий соус — яловича вирізка гриль дає м'ясний сік, гірчиця в соусі пряну ноту, мед солодкість що балансує м'ясо.",450,"300 г","Гриль-салат з яловичою вирізкою і овочами гриль — печериці, кабачок, томати черрі, болгарський перець. Гірчично-медовий соус. Порція 300г, ситний.","По суті це повноцінна страва а не просто салат. Якщо гість хоче щось легше за основну страву але ситне — рекомендуйте. До нього добре підійде червоне вино або наші настоянки."],[32,"Салати","Гриль-салат з куркою","Мікс салату, печериці, кабачок, помідор черрі, болгарський перець, куряче філе, гірчично-медовий соус — гриль дає курці і овочам карамелізовану солодкість, гірчиця в соусі пряну ноту в фіналі.",370,"310 г","Гриль-салат з курячим філе і овочами гриль з гірчично-медовим соусом. Порція 310г. Легший і доступніший за яловичий варіант.","Якщо гість хоче гриль-салат але не їсть яловичину або хоче щось легше — пропонуйте цей. Добре заходить як основна страва на обід. До нього підійде біле вино або крафтове пиво."],[33,"Салати","Салат з качиною грудкою та соусом з ялівцю","Мікс салату, бланшований перець, качина грудка су-від, соус з ялівцю — технологія су-від зберігає сік качки і дає шовкову текстуру, ялівець у соусі хвойну пряну ноту.",340,"230 г","Салат з качиною грудкою су-від — м'яка шовкова текстура качки, бланшований перець і соус з ялівцю. Порція 230г. Подається злегка теплим.","Запитайте гостя чи пробував він качку взагалі — якщо так, це дуже виграшна позиція. Нетипова для салатів. До нього рекомендуйте червоне вино або авторський коктейль."],[34,"Салати","Салат з тунцем","Тунець, мікс салату, стручкова квасоля, помідори черрі, перепелине яйце, кунжут, соус Нісуаз, соус Унагі — тунець дає щільний морський смак, соус Унагі солодку соєву глазур, кунжут горіховий аромат.",340,"230 г","Салат з тунцем — свіжий тунець з міксом салату, стручковою квасолею і перепелиним яйцем. Подвійний соус: Нісуаз і Унагі. Порція 230г.","Якщо гість питає про рибу або хоче щось середземноморське — пропонуйте цей салат. До нього найкраще підійде біле вино або авторський коктейль на цитрусовій основі."],[35,"Салати","Салат з ростбіфом","Мікс салату, маринована фіолетова цибуля, яловича вирізка, болгарський перець, огірок, в'ялений томат, пармезан, устричний соус, мед, перець чилі, сік лайму — в'ялений томат концентрує кислотність, устричний соус дає умамі, перець чилі гостроту в завершенні.",395,"310 г","Салат з ростбіфом з яловичої вирізки — в'ялені томати, болгарський перець, пармезан, устричний соус і мед. Порція 310г. Пікантний, з кислинкою і умамі.","Один з найбільш виразних салатів меню. Якщо гість хоче щось м'ясне але не хоче основну страву — це хороший вибір. До нього рекомендуйте червоне вино або наші настоянки."],[36,"Салати","Тайський салат з яловичини та баклажану","Яловича вирізка, баклажан, помідори черрі, соус Пад Тай — баклажан вбирає соус Пад Тай і дає м'яку кремову текстуру, яловичина щільний м'ясний контраст.",460,"220 г","Тайський салат з яловичиною і баклажаном у соусі Пад Тай. Порція 220г. Смак пікантний, азіатський, баклажан м'який.","Якщо гість питає щось нестандартне або любить азіатську кухню — пропонуйте цей салат. Уточніть про гостроту. До нього підійде наше крафтове пиво або авторський коктейль."],[37,"Салати","Салат з морепродуктами","Креветки, мідії, кільця кальмару, карамелізований персик, мікс салату, помідор черрі, крем-сир, соус на основі кунжутної олії — карамелізований персик дає фруктову солодкість, кунжутна олія горіховий аромат, мідії морську солоність.",450,"340 г","Салат з морепродуктами — креветки, мідії, кальмар і карамелізований персик з крем-сиром. Соус на кунжутній олії. Порція 340г.","Якщо за столом хтось вже замовив морепродукти або питає щось з моря серед салатів — це найкращий варіант. До нього рекомендуйте ігристе або біле вино."],[38,"Салати","Салат з гарбузом та хамоном","Гарбуз у трьох текстурах, хамон, фета, помідори черрі, трюфельна паста, мед — трюфельна паста дає землистий умамі, хамон солоний м'ясний жир, мед солодкість що балансує сіль.",250,"150 г","Салат з гарбузом і хамоном — гарбуз у трьох текстурах, трюфельна паста і мед. Порція 150г, невеликий. Смак складний, трюфель відчувається.","Гарна закуска або легкий салат на початок. Якщо гість любить хамон або трюфельний аромат — рекомендуйте. До нього добре підійде біле або рожеве вино."],[39,"Салати","Салат з гарбузом та соусом Дорблю","Мікс салату, гарбуз, груша, моцарела, пармезан, сирний соус дорблю — груша дає соковиту солодкість, дорблю різку пліснявову ноту, сирний соус пом'якшує контраст.",210,"250 г","Салат з гарбузом і соусом Дорблю — гарбуз, груша, моцарела і пармезан з сирним соусом. Порція 250г. М'який смак, Дорблю не різкий.","Якщо гість хоче спробувати Дорблю але боїться що буде занадто інтенсивно — це безпечний варіант. Також гарний вибір для вегетаріанців. До нього підійде біле вино."],[40,"Салати","Салат з тофу та буряка","Буряк, тофу, салат Чука, горіховий соус — буряк дає землисту солодкість, тофу нейтральну щільну текстуру, горіховий соус жирний аромат.",210,"180 г","Салат з тофу і буряка з салатом Чука і горіховим соусом. Порція 180г. Легкий, рослинний, без м'яса і риби.","Рекомендуйте вегетаріанцям і тим хто стежить за харчуванням. Якщо гість питає щось без м'яса — пропонуйте. До нього підійде авторський коктейль або біле вино."],[41,"Салати","Карпачо з буряка","Буряк печений, мікс салату, помідор, гірчично-медовий соус, соус Песто — соус Песто дає базилікову свіжість і горіховий жир, гірчиця в соусі легку пряну кислинку.",250,"320 г","Карпачо з печеного буряка з міксом салату і соусом Песто. Порція 320г. Подається холодним, виглядає яскраво.","Хороший вибір для вегетаріанців або як легкий старт до основної страви. Якщо гість питає щось незвичне без м'яса — пропонуйте. До нього підійде біле вино або авторський коктейль."],[42,"Салати","Салат з капустою","Капуста, огірок, болгарський перець, сік лайму, кріп, петрушка, олія, цукор — сік лайму дає яскраву кислотність, яка підкреслює хрускіт свіжої капусти та перцю.",210,"185 г","Салат з капустою, огірком і болгарським перцем із соком лайму. Порція 185г. Хрусткий, свіжий, легкий. Без майонезу.","Найпростіший і найдешевший салат меню. Хороший як доповнення до основної страви або для тих хто хоче щось зовсім легке. До нього підійде пиво або авторський коктейль."],[43,"Салати","Салат з трьома видами томатів та Страчателлою","Три види томатів, сир Страчателла, фіолетова цибуля, базилік — Страчателла дає вершкову молочну ніжність, різні сорти томатів від солодкого до кислого.",240,"300 г","Салат з трьох видів томатів і сиру Страчателла з базиліком і фіолетовою цибулею. Порція 300г. Свіжий, літній смак.","Якщо гість питає щось свіже і легке або приходить влітку — це один з найкращих варіантів. До нього рекомендуйте ігристе або біле вино."],[44,"Салати","Теплий салат з маринованою грушею та Камамбером","Камамбер у паніровці, груша у цитрусовому сиропі, ягідний соус, помідори черрі, фенхель, мікс салату — Камамбер при нагріванні стає текучим і дає вершково-грибний аромат, цитрусовий сироп підкреслює кислинку груші.",280,"280 г","Теплий салат з Камамбером у паніровці і маринованою грушею в цитрусовому сиропі. Ягідний соус, фенхель. Порція 280г. Подається теплим.","Нетипова позиція — Камамбер гарячий і тягнеться. Якщо гість хоче щось незвичне серед салатів — пропонуйте. До нього добре підійде біле або рожеве вино."],[45,"Салати","Печений гарбуз з хамоном","Запечений карамелізований гарбуз, вершковий сир, помідори черрі, хамон, насіння гарбуза — карамелізований гарбуз концентрує солодкість, хамон дає солону м'ясну ноту, насіння горіховий хруст.",290,"200 г","Печений гарбуз з хамоном, вершковим сиром і насінням гарбуза. Порція 200г. Подається теплим. Смак солодкуватий з солоним акцентом хамону.","Якщо гість вже замовив основну страву і хоче щось невелике на початок — хороший вибір. До нього підійде біле або рожеве вино і наші авторські коктейлі."],[46,"Закуски","Овочі свіжі","Болгарський перець, огірок, помідор, кріп, петрушка — свіжі овочі без термічної обробки зберігають максимум соку і хрускіт.",250,"330 г","Тарілка свіжих овочів нарізаних — перець, огірок, помідор, зелень. Порція 330г. Нічого крім свіжих овочів.","Замовляють зазвичай до пива або настоянок як перекус. Хороший вибір якщо гість чекає компанію і хоче поставити щось на стіл одразу. Рекомендуйте до фірмових настоянок або пива."],[47,"Закуски","Курячий паштет зі смородиною","Паштет з курячої печінки, масло бер-нуазет, смородина, чіабата — масло бер-нуазет дає горіховий аромат, смородина кислинку що розкриває жирність печінки.",280,"260 г","Паштет з курячої печінки на маслі бер-нуазет — шовкова текстура, смородинова кислинка. Подається на хрусткій чіабаті. Порція 260г.","Якщо гість просить щось некаліфорнійне до аперитиву — це відмінний вибір. Питають що таке бер-нуазет — це карамелізоване вершкове масло, пояснюйте просто. Найкраще до червоного вина або наших настоянок."],[48,"Закуски","Сировялена нарізка з дичини","Бастурма з оленини, бастурма з косулі, в'ялене м'ясо з оленини — оленина дає темне насичене м'ясо з легкою дичавинкою, косуля більш ніжну і тонку ноту.",480,"80 г","Три види сировяленого м'яса з дичини — бастурма з оленини, бастурма з косулі і вялене м'ясо з оленини. Порція 80г, невелика. Подається нарізаною тарілкою.","Рідкісна позиція — такого немає у більшості ресторанів. Якщо гість цікавиться нетиповими продуктами або любить м'ясні закуски — пропонуйте. Порція 80г, тому краще разом з іншими закусками. Ідеально до наших фірмових настоянок або червоного вина."],[49,"Закуски","Мікс сирів","Пармезан, дорблю, гауда, волоський горіх, мед — дорблю дає різку пліснявову гостроту, гауда молочну солодкість, мед пом'якшує і зв'язує обидва смаки.",245,"195 г","Сирна тарілка — пармезан, дорблю, гауда з волоським горіхом і медом. Порція 195г. Три різні характери сиру.","Гарний вибір для тих хто хоче щось до вина або просто пробує різне. Питайте чи гість їсть блакитний сир — дорблю тут є. До неї рекомендуйте червоне або біле вино і авторські коктейлі."],[50,"Закуски","Курка по-тайськи","Куряче стегно су-від, зелена цибуля, кунжут, соус Теріякі, соус Срірача — технологія су-від зберігає весь сік стегна, Теріякі дає солодку соєву глазур, Срірача гостре тепло.",160,"175 г","Куряче стегно су-від в соусах Теріякі і Срірача з кунжутом. Порція 175г. Зовні хрустке, всередині дуже соковите. Є пікантність від срірачі.","Одна з найбільш популярних закусок — добре йде до пива і настоянок. Якщо гість замовляє алкоголь — пропонуйте як снек. Уточніть про гостроту."],[51,"Закуски","Гуакамоле","Авокадо, часник, перець чилі, цибуля, фреш лайму, грінки з чіабати — авокадо дає жирну вершкову основу, сік лайму кислотність, чилі гостроту в завершенні.",290,"210 г","Гуакамоле з авокадо, чилі і соком лайму. Подається з грінками з чіабати. Порція 210г. Свіже, без консервантів.","Якщо гість просить щось вегетаріанське або без м'яса до аперитиву — це хороший вибір. До нього добре підійдуть наші авторські коктейлі або мексиканські теми в барі."],[52,"Закуски","Вітелло тоннато","Ростбіф, яйця, тунець, мариновані огірки, анчоуси — анчоуси і тунець у соусі дають подвійний морський умамі, яєчна основа кремову в'язкість.",580,"160 г","Вітелло тоннато — тонко нарізаний ростбіф під соусом з тунця, яєць і анчоусів. Подається холодним. Порція 160г. Смак делікатний, морський акцент.","Питають часто що це таке — поясніть: це класична італійська страва, телятина або яловичина з соусом на основі тунця. Якщо гість любить карпачо або тартар — запропонуйте. До неї найкраще підійде біле вино."],[53,"Закуски","Запечений баклажан з моцарелою та горіхами","Запечений баклажан, волоський горіх, моцарела, мікс салату, помідор черрі, смородиновий соус, соус Пад Тай — баклажан при запіканні стає м'яким і вбирає смаки соусів, горіх дає хрускіт і гіркуватість.",230,"230 г","Запечений баклажан з моцарелою і волоським горіхом. Два соуси — смородиновий і Пад Тай. Порція 230г. Подається гарячим.","Хороший вибір для вегетаріанців або як гаряча закуска. Якщо гість питає щось незвичне без м'яса — пропонуйте. До нього підійдуть наші настоянки або авторський коктейль."],[54,"Закуски","Форшмак","Оселедець, куряче яйце, плавлений сир, яблуко, помідор черрі, лимон, грінки — оселедець дає солоний жирний смак, яблуко кислинку і свіжість, плавлений сир кремову текстуру.",250,"170 г","Форшмак з оселедця з яблуком, яйцем і плавленим сиром. Подається на грінках з лимоном. Порція 170г. Смак солоний, кислуватий.","Закуска яка ділить гостей — або люблять або ні. Якщо гість питає традиційні страви або вже замовляє оселедець — запропонуйте. До нього відмінно підійдуть наші фірмові настоянки."],[55,"Закуски","Тартар з тунця","Свіжий тунець, мус з авокадо, васабі — тунець дає чистий морський смак, васабі пряну ноту в носі, авокадо жирну м'якість.",320,"130 г","Тартар з тунця — свіжий тунець з мусом з авокадо і васабі. Порція 130г. Подається холодним, сирий продукт.","Перед тим як рекомендувати — уточніть чи гість їсть сиру рибу. Якщо так і любить суші або сашімі — рекомендуйте впевнено. До нього найкраще підійде біле вино або саке якщо є."],[56,"Закуски","Татакі з тунця","Тунець, цибуля порей, авокадо, перець чилі, огірок, соус Унагі, кунжут — швидке обсмажування зберігає сирий центр тунця, соус Унагі дає солодку соєву глазур зовні.",320,"160 г","Татакі з тунця — тунець швидко обсмажений зовні, сирий всередині. Соус Унагі, авокадо, огірок і кунжут. Порція 160г.","Якщо гість питає різницю між тартаром і татакі — поясніть: татакі обсмажується зовні. Якщо гість любить японську кухню — рекомендуйте. До нього добре підійде біле вино або авторський коктейль."],[57,"Закуски","Асорті сала","Три види сала, корнішони, фіолетова цибуля, кріп, петрушка, чорний хліб, гірчиця, хрін — різні види сала дають різну щільність і рівень солоності, хрін і гірчиця пряну гостроту.",240,"350 г","Асорті сала — три види, з корнішонами, гірчицею, хріном і чорним хлібом. Порція 350г. Традиційна українська закуска.","Класика яка добре заходить у компаніях. Замовляють зазвичай до настоянок або пива. Якщо за столом гості замовляють алкоголь — пропонуйте одразу. До нього рекомендуйте наш сет фірмових настоянок."],[58,"Закуски","Оселедець з картоплею","Оселедець, ікра оселедця, картопля, маринована фіолетова цибуля — ікра оселедця дає концентрований рибний умамі, маринована цибуля кислинку що знімає жирність.",290,"220 г","Оселедець з картоплею — оселедець, ікра оселедця, відварна картопля і маринована цибуля. Порція 220г.","Якщо гість замовляє настоянки або просить традиційні закуски — це логічна рекомендація. До нього відмінно підходять наші фірмові настоянки."],[59,"Закуски","Креветки в азіатському стилі","Тигрові креветки — щільна м'ясиста текстура, пікантний азіатський маринад дає баланс солодкого, кислого і гострого.",440,"300/40 г","Тигрові креветки в азіатському маринаді. Порція 300г — досить велика. Подаються гарячими.","Якщо гість замовляє морепродукти або питає щось ситне з закусок — пропонуйте. Порція велика — можна брати на двох. До них рекомендуйте біле вино або авторський коктейль."],[60,"Закуски","Антіпасті","Хамон, салямі, маслини Каламати, Камамбер, Пармезан, Дорблю, чіпси з льону, фізаліс, кумкват — хамон дає солоний м'ясний жир, Дорблю пліснявову гостроту, кумкват цитрусову кислинку на завершення.",420,"215 г","Антіпасті — хамон, салямі, три сири, маслини Каламати, чіпси з льону, фізаліс і кумкват. Порція 215г. Подається на тарілці різноманіття.","Ідеальна закуска на аперитив для двох або більше. Якщо гість замовляє вино — пропонуйте антіпасті як першу позицію. До нього рекомендуйте біле або червоне вино і авторські коктейлі."],[61,"Закуски","Корзинки з буряка","Буряк печений, козячий сир, фета, рисовий папір, гарбузові чіпси, трюфельна паста, волоський горіх — трюфельна паста дає землистий умамі, козячий сир кислу молочну свіжість, буряк солодку основу.",110,"50 г","Корзинки з буряка — буряк, козячий сир, фета і трюфельна паста в рисовому папері. Порція 50г — 1-2 шматки. Невелика закуска.","Подається як невеликий амюз-буш або доповнення. Найкраще пропонувати разом з іншими закусками а не окремо. Порція мала — попередьте гостя. До неї підійде біле вино або авторський коктейль."],[62,"Закуски","Тартар з яловичини","Яловичина, каперси, корнішони, фіолетова цибуля, перець чилі, перепелине яйце, пармезан, булочка — каперси дають кислинку і рослинну гіркуватість, жовток кремову в'язкість, чилі гостроту.",420,"150 г","Тартар з яловичої вирізки з каперсами, корнішонами, перцем чилі і перепелиним яйцем. Подається з булочкою. Порція 150г. Сирий продукт.","Обов'язково уточніть чи гість їсть сире м'ясо — деякі не знають що тартар сирий. Якщо так — рекомендуйте впевнено, це одна з кращих закусок меню. До нього найкраще підійде червоне вино."],[63,"Закуски","Хумус","Нут, кунжутна паста, перець чилі, часник, оливкова олія, чіабата — тахіні дає горіховий жир і гіркуватість, часник пряну гостроту, оливкова олія фруктову м'якість.",170,"220 г","Хумус з нуту з часником і чилі. Подається з хрусткою чіабатою. Порція 220г. Теплий, пряний.","Якщо гість питає щось вегетаріанське до аперитиву — це перший варіант. До нього добре підходять авторські коктейлі або пиво."],[64,"Закуски","Маринована локальна форель","Мариноване філе локальної форелі, соус з манго, зелена олія, булочка — маринування зберігає ніжність форелі, соус манго дає тропічну солодку кислинку.",340,"190 г","Локальна форель мариновна — ніжна, подається з соусом манго і зеленою олією. З булочкою. Порція 190г.","Якщо гість цікавиться локальними продуктами або питає рибні закуски — пропонуйте. Поясніть що форель місцева. До неї підійде біле вино або авторський коктейль."],[65,"Закуски","Крудо з лосося під соусом Понзу","Слабосолений лосось, ікра тобіко, помідор черрі, цитрусовий соус, соус Понзу — ікра тобіко дає хрускіт і морський йодистий смак, соус Понзу цитрусову кислинку і соєву глибину.",290,"110 г","Крудо з лосося під соусом Понзу — тонкі слайси слабосоленого лосося з ікрою тобіко. Порція 110г. Подається холодним, сирий продукт.","Якщо гість любить карпачо або суші — це природна рекомендація. Порція невелика, можна брати разом з іншою закускою. До нього рекомендуйте ігристе або біле вино."],[66,"Закуски","Печені перчики","Печені перці, сирний соус, медовий маринад — запікання концентрує солодкість перців, медовий маринад карамелізується, сирний соус дає кремову округлість.",250,"200 г","Печені перці з сирним соусом і медовим маринадом. Порція 200г. Подаються теплими. Смак солодкуватий, кремовий.","Якщо гість замовляє вегетаріанські страви або просить щось тепле і некалорійне з закусок — пропонуйте. До них підійде біле вино або авторський коктейль."],[67,"Закуски","Соління","Квашені помідори, огірки, капуста, кімчі з помідорів черрі, мариновані печериці, фаршировані сиром перчики — ферментовані овочі дають пробіотичну кислинку, кімчі гостроту, гриби умамі і щільність.",400,"400 г","Соління — сет з квашених помідорів, огірків, капусти, кімчі і маринованих печериць з фаршированими перчиками. Порція 400г. Велика тарілка на компанію.","Ідеально ставити на стіл великої компанії. Якщо гості замовляють настоянки або пиво — пропонуйте одразу. До солінь найкраще підходять наші фірмові настоянки."],[68,"Закуски","Печений Камамбер з ананасом та інжиром","Камамбер, смажений ананас, інжир, порічка, полунична пюре, грісіні — Камамбер при нагріванні стає текучим з грибним ароматом, ананас карамелізується і дає кислу солодкість.",450,"230 г","Камамбер запечений з ананасом, інжиром, порічкою і полуничним пюре. Подається з грісіні. Порція 230г. Їсти треба гарячим — тягнеться.","Нагадайте гостю що потрібно їсти одразу поки гарячий. Якщо гість любить м'які сири — рекомендуйте. До нього добре підійде біле або рожеве вино і авторські коктейлі."],[69,"Закуски","Тартар з лосося, манго та авокадо","Лосось, авокадо, манго, каперси, крем-сир, французька булочка — манго дає тропічну солодку кислинку, авокадо жирну кремову текстуру, каперси рослинну гіркуватість.",440,"150 г","Тартар з лосося з авокадо, манго і каперсами. Подається з крем-сиром і французькою булочкою. Порція 150г. Свіжий, тропічний смак.","Якщо гість вже замовив інший тартар або хоче щось з риби сирої — пропонуйте. До нього найкраще підійде ігристе або біле вино."],[70,"Закуски","Свинні вушка у пікантному соусі","Свинні вушка, соєвий соус, імбир, часник, цибуля порей, кунжут — тривале гасіння розм'якшує хрящі вушок, соєвий соус і імбир дають солоно-пряний азіатський фон.",240,"130 г","Свинні вушка в соєвому соусі з імбиром і кунжутом. Порція 130г. Хрустка текстура, пікантний смак. Незвична позиція.","Питають часто що це — поясніть просто: хрусткі свинні вушка в азіатському маринаді. Замовляють ті хто хоче спробувати нетипове або вже знає цю страву. До них відмінно підходить наше крафтове пиво або настоянки."],[71,"Основні страви","Паста з куркою та білими грибами","Паста, білі гриби, куряче філе, вершковий соус, печериці, пармезан — білі гриби дають лісовий умамі, вершковий соус зв'язує гриби і курку в єдину кремову текстуру.",325,"350 г","Паста з курячим філе і білими грибами у вершковому соусі з пармезаном. Порція 350г, ситна.","Якщо гість хоче пасту і любить гриби — рекомендуйте впевнено. До неї підійде біле вино або авторський коктейль."],[72,"Основні страви","Паста Карбонара","Бекон, куряче яйце, пармезан, вершки, паста — жовток і пармезан при нагріванні утворюють кремовий соус, бекон дає копчену солоність.",390,"300 г","Класична карбонара з беконом, яйцем і пармезаном. Без вершків у класичному рецепті — соус утворює яйце. Порція 300г.","Якщо гість питає різницю між карбонарою і пастою з вершками — поясніть. До неї рекомендуйте біле вино або крафтове пиво."],[73,"Основні страви","Феттучіне з куркою та білими грибами","Паста феттучіне, куряче філе, білі гриби, вершки, пармезан — широка стрічка феттучіне тримає більше соусу, білі гриби дають лісовий умамі.",360,"300 г","Феттучіне — широка стрічкова паста з куркою і білими грибами у вершковому соусі з пармезаном. Порція 300г.","Якщо гість питає різницю між цією позицією і пастою з грибами — пояснюйте: феттучіне ширша і тримає більше соусу. До неї підійде біле вино."],[74,"Основні страви","Феттучіне з лососем","Лосось, паста феттучіне, шпинат, вершковий соус — шпинат дає рослинну гіркуватість що балансує жирний вершковий соус, лосось щільний морський смак.",440,"300 г","Феттучіне з лососем, шпинатом і вершковим соусом. Порція 300г. Легша пасти з м'ясом, рибний смак.","Якщо гість хоче пасту але не їсть м'яса або хоче щось з риби — це логічна рекомендація. До неї рекомендуйте біле вино."],[75,"Основні страви","Паста з чорнилами каракатиці та морепродуктами","Паста з чорнилами каракатиці, креветки, мідії, кільця кальмару, помідор черрі, цибуля порей, пармезан, соус томатний або вершковий — чорнила каракатиці дають морський мінеральний смак і колір, мідії і креветки рівні йодистої солоності.",450,"365 г","Чорна паста з чорнилами каракатиці з креветками, мідіями і кальмарами. Порція 365г. Виглядає незвично — паста чорного кольору.","Питають часто про колір — поясніть що це чорнила каракатиці, натуральний продукт. Якщо гість любить морепродукти і хоче щось ефектне — рекомендуйте. До неї підійде біле вино."],[76,"Основні страви","Різотто по-карпатськи з білими грибами","Рис Арборіо, білі гриби, біле вино, пармезан — рис Арборіо виділяє крохмаль і дає кремову текстуру, біле вино кислинку і аромат, гриби глибину.",340,"300 г","Різотто з білими грибами на рисі Арборіо з білим вином і пармезаном. Порція 300г. Кремова текстура, виражений грибний аромат.","Якщо гість любить гриби або хоче щось без м'яса серед основних — рекомендуйте. До нього найкраще підійде біле вино."],[77,"Основні страви","Оджахурі з яловичиною","Яловича вирізка, картопля, болгарський перець, фіолетова цибуля, соус Деміглас, соус соєвий — Деміглас концентрує м'ясний бульйон до насиченого соусу, соєвий дає умамі і підсилює м'ясний смак.",590,"330 г","Оджахурі — грузинська страва з яловичої вирізки з картоплею у соусі Деміглас. Порція 330г, ситна.","Якщо гість питає щось грузинське серед основних або хоче ситну яловичу страву — рекомендуйте. До нього добре підійде червоне вино або наші настоянки."],[78,"Основні страви","Вареники з картоплею","Картопля, вершковий крем-сир, сметана, цибулевий соус — вершковий крем-сир дає жирну молочну ніжність, цибулевий соус солодку карамельну ноту.",280,"250 г","Вареники з картоплею — подаються з вершковим крем-сиром, сметаною і цибулевим соусом. Порція 250г.","Якщо гість хоче щось традиційне, без м'яса або просить вегетаріанське серед основних — рекомендуйте. До вареників добре підходять наші фірмові настоянки."],[79,"Основні страви","Пельмені","Свинина, телятина, грибний соус, моцарела, томатний сік — свинина дає жирну соковитість, телятина ніжну м'ясну структуру, моцарела тягучу молочність.",260,"350 г","Пельмені зі свининою і телятиною під грибним соусом з моцарелою. Подаються з томатним соком. Порція 350г.","Якщо гість хоче щось ситне і просте або просить домашню кухню — пропонуйте. Нагадайте що йдуть з томатним соком. До них підходять наші настоянки або пиво."],[80,"Основні страви","Банош","Кукурудзяна крупа, бекон, цибуля, мус з печериць, трюфельна паста, вершки, зелена цибуля — кукурудза при варінні на вершках дає солодку кремову основу, трюфельна паста землистий умамі.",330,"350 г","Банош — гуцульська кукурудзяна каша з шкварками, грибним мусом з трюфельною пастою. Порція 350г. Подається гарячим.","Якщо гість цікавиться регіональними стравами або питає щось автентичне — рекомендуйте. Поясніть що це карпатська страва. До нього добре підійдуть наші фірмові настоянки."],[81,"Основні страви","Кровянка з тушкованою капустою","Кров'янка, тушкована капуста, маринована цибуля, цибуля порей, соус з хрону, чіабата — тушкована капуста дає кислу м'яку текстуру, соус хрону різку пряну гостроту в завершенні.",290,"365 г","Кров'янка з тушкованою капустою і соусом хрону. Подається з чіабатою. Порція 365г. Смак насичений, хрін гострий.","Позиція для тих хто знає і любить кров'янку. Якщо гість питає традиційну кухню або субпродукти — пропонуйте. До неї відмінно підходять наші фірмові настоянки."],[82,"Основні страви","Котлета по-київськи","Куряче філе, вершкове масло, картопляне пюре з в'яленими томатами — вершкове масло всередині котлети розтоплюється при розрізанні і насичує м'ясо зсередини.",380,"310 г","Котлета по-київськи з курячого філе — всередині розтоплене вершкове масло. Подається з картопляним пюре. Порція 310г. Попередьте гостя про перший надріз.","Обов'язково попередьте гостя що при розрізанні витікає масло — щоб не забризкатись. Якщо гість ніколи не пробував — рекомендуйте як класику. До неї підійде біле вино або авторський коктейль."],[83,"Основні страви","Котлета Кордон Блю","Моцарела, бекон, курячий фарш, паніровка, мікс салату, помідори черрі — Моцарела при нагріванні стає тягучою, бекон дає копчену солоність, паніровка хрустку зовнішність.",370,"240 г","Котлета Кордон Блю — куряче філе з моцарелою і беконом у паніровці. Подається з міксом салату. Порція 240г.","Якщо гість хоче щось з курки але цікавіше за просте філе — рекомендуйте. До неї підійде біле вино або крафтове пиво."],[84,"Основні страви","Чахохбілі","Куряче стегно, кінза, петрушка, перець чилі, томатний соус, часник, фіолетова цибуля, помідори черрі, грузинські спеції, випічка — спеції хмелі-сунелі і кінза дають характерний кавказький аромат, томат кислу основу соусу.",440,"380 г","Чахохбілі — куряче стегно в томатному соусі з кінзою, часником і грузинськими спеціями. Подається з випічкою. Порція 380г. Ароматна, пряна страва.","Якщо гість цікавиться грузинською кухнею або хоче щось пряне — рекомендуйте. Уточніть про кінзу — деякі не люблять. До неї добре підійдуть наші настоянки або червоне вино."],[85,"Основні страви","Курча з грецьким соусом","Курча, птітім, вершкове масло, грецький соус — птітім вбирає вершкове масло і соус, грецькі трави дають ароматну пряну ноту до курки.",360,"350 г","Курча з грецьким соусом на травах і гарніром птітім. Порція 350г. М'яке, ароматне, середземноморський характер.","Якщо гість хоче курку але щось цікавіше за стандартне філе — рекомендуйте. До неї підійде біле вино або авторський коктейль."],[86,"Основні страви","Куряче стегно з часниковим мусом","Куряче стегно, печериця, кабачок, болгарський перець, часниковий мус — часниковий мус дає м'який солодкуватий часниковий аромат без різкості сирого часнику.",240,"370 г","Куряче стегно з часниковим мусом, печерицями і кабачком. Порція 370г. Проста, ситна страва з м'яким часниковим ароматом.","Якщо гість хоче щось ситне і некалорійне — хороший вибір. До неї підійде біле вино або крафтове пиво."],[87,"Основні страви","Куряче філе з карамелізованим виноградом","Куряче філе, карамелізований виноград, соус Дорблю — карамелізований виноград дає концентровану фруктову солодкість, Дорблю різку пліснявову гостроту в контраст.",290,"200 г","Куряче філе з карамелізованим виноградом і соусом Дорблю. Порція 200г. Невелика, смак солодко-пікантний.","Питайте чи гість їсть блакитний сир — Дорблю відчувається. Якщо так і хоче щось нестандартне — рекомендуйте. До неї добре підійде біле або рожеве вино."],[88,"Основні страви","Курячий стейк з кукурудзяним пюре та броколі","Куряче філе, броколі, вершки, кукурудза, соус Барбекю, соус Теріякі — кукурудза дає солодкість пюре, Теріякі солодку соєву глазур, броколі рослинну гіркуватість.",300,"440 г","Курячий стейк з кукурудзяним пюре і броколі. Подвійний соус барбекю і теріякі. Порція 440г, велика.","Якщо гість хоче ситну страву з курки або хтось замовляє для дитини і дорослого разом — хороший вибір. До неї підійде біле вино або крафтове пиво."],[89,"Основні страви","Куряче філе з пікантним соусом та огірками Пікулі","Курячий стейк, смажений кабачок, Ромен, марин. огірки Пікулі, пікантний соус — огірки Пікулі дають кислинку і хруст, пікантний соус гостроту що розкривається після ніжної курки.",470,"290 г","Курячий стейк з кабачком, салатом ромен і маринованими огірками Пікулі. Пікантний соус. Порція 290г.","Якщо гість хоче щось легке і пікантне з курки — рекомендуйте. До неї підійде біле вино або авторський коктейль."],[90,"Основні страви","Курка з овочами WOK та рисом","Куряче стегно, цибуля порей, морква, часник, імбир, перець чилі, соус WOK, рис, яйце — імбир і часник при швидкому обсмажуванні дають ароматну пряну основу, яйце кремову в'язкість рису.",310,"300 г","Курка WOK з рисом — куряче стегно з цибулею порей, морквою, імбиром і яйцем у соусі WOK. Порція 300г. Гостра і ароматна.","Якщо гість питає щось азіатське або хоче ситну страву без важкості — рекомендуйте. Уточніть про гостроту. До неї добре підійде наше крафтове пиво або авторський коктейль."],[91,"Основні страви","Полента з курячими рулетиками","Полента, куряче філе, кукурудза, морква міні, вершки, соус Песто, зелень — полента з вершками дає солодку кремову основу, соус Песто базилікову свіжість і горіховий жир зверху.",430,"390 г","Полента з курячими рулетиками і соусом Песто. Порція 390г. Кремова кукурудзяна основа, рулетики з курки.","Якщо гість не знає що таке полента — поясніть: кремова кукурудзяна каша. Нетипова позиція — пропонуйте тим хто хоче спробувати щось нове. До неї підійде біле вино."],[92,"Основні страви","Рис WOK з куркою та овочами","Рис, болгарський перець, морква, куряче філе, горошок, кукурудза, яйце, мед, соус Срірача, соус Теріякі, зелена цибуля — Срірача дає перцеву гостроту, Теріякі солодку соєву глазур, мед підсилює карамелізацію рису.",250,"300 г","Рис WOK з куркою і овочами в соусах теріякі і срірача. Порція 300г. Солодкувато-гострий смак.","Якщо гість хоче щось просте і ситне в азіатському стилі — рекомендуйте. Уточніть про гостроту від срірачі. До нього добре підійде наше крафтове пиво."],[93,"Основні страви","Локшина WOK з куркою та овочами","Локшина удон, куряче філе, морква, болгарський перець, печериця, цибуля порей, кунжут, соус Теріякі, зелена цибуля — локшина удон має щільну текстуру, Теріякі дає солодку соєву глазур на кожній нитці.",360,"300 г","Локшина удон WOK з куркою і овочами в соусі теріякі. Порція 300г. Широка густа локшина, солодкувато-соєвий смак.","Якщо гість хоче WOK але не рис — пропонуйте цей варіант. До неї підійде крафтове пиво або авторський коктейль."],[94,"Основні страви","Локшина WOK з телятиною та овочами","Локшина удон, яловича вирізка, морква, болгарський перець, печериця, цибуля порей, кунжут, соус Теріякі, соус соєвий — яловича вирізка дає темний насичений м'ясний смак, соєвий соус і Теріякі солоно-солодкий азіатський фон.",420,"350 г","Локшина удон WOK з яловичою вирізкою і овочами в соусі теріякі. Порція 350г. Насиченіша і більш м'ясна за версію з куркою.","Якщо гість хоче WOK але з м'ясом — рекомендуйте цей варіант. Порція більша і ситніша. До неї підійде крафтове пиво."],[95,"Основні страви","Овочі гриль","Болгарський перець, печериця, кабачок, цибуля, кукурудза, соус Песто, соус соєвий — гриль карамелізує натуральні цукри овочів, соус Песто дає базилікову свіжість що підкреслює димний смак.",240,"320 г","Овочі гриль — перець, печериця, кабачок, цибуля і кукурудза з соусами Песто і соєвим. Порція 320г.","Якщо гість просить вегетаріанське серед основних або хоче гарнір — рекомендуйте. Можна пропонувати як доповнення до стейку або м'яса. До них підійде біле вино або авторський коктейль."],[96,"Основні страви","Смажена картопля з білими грибами та шпинатом","Картопля, білі гриби, печериці, шпинат, часник, соус Тартар — білі гриби дають лісовий умамі, шпинат рослинну свіжість, соус Тартар кислу пряну ноту.",350,"300 г","Смажена картопля з білими грибами і шпинатом з соусом Тартар. Порція 300г. Хрустка картопля з грибним ароматом.","Якщо гість питає гарнір або хоче щось рослинне і ситне — пропонуйте. Можна брати як доповнення до м'ясних страв. До неї підійде пиво або авторський коктейль."],[97,"Основні страви","Сом кларієвий з запеченими овочами та селерово-розмариновим мусом","Філе сома, стручкова квасоля, болгарський перець, стебло селери, селерово-розмариновий мус — мус дає пряну землисту ноту що підкреслює ніжний нейтральний смак сома.",420,"320 г","Сом кларієвий з запеченими овочами і мусом із селери та розмарину. Порція 320г. Ніжна риба, делікатний смак.","Якщо гість питає рибу серед основних і хоче щось нестандартне — рекомендуйте. Поясніть що сом кларієвий це культивована риба без рибного запаху. До нього підійде біле вино."],[98,"Основні страви","Форель по-середземноморськи","Форель, кабачок, печериця, болгарський перець, помідори черрі, вершки, кінза, м'ята, тим'ян, лимон — м'ята і тим'ян дають середземноморський аромат, лимон кислотність що освіжає жирний вершковий соус.",450,"300 г","Форель середземноморська з кабачком, печерицями і вершковим соусом на травах. Порція 300г, подається з лимоном.","Якщо гість хоче рибу — це найбільш комплексна рибна страва меню. Уточніть що форель місцева. До неї рекомендуйте біле вино."],[99,"Основні страви","Стейк з лосося у азіатському стилі","Лосось, кімчі з помідорів черрі, Ромен, вершковий соус — кімчі дає ферментовану гостру кислинку, вершковий соус пом'якшує і балансує різкість ферментації.",610,"240 г","Стейк з лосося з корейськими кімчі і вершковим соусом. Порція 240г. Кімчі дають пікантну кислинку.","Питайте гостя про гостроту і чи знайоме йому кімчі. Якщо так — рекомендуйте. Незвична подача для лосося. До нього підійде біле вино або авторський коктейль."],[100,"Основні страви","Стейк з тунця та гарбузом","Тунець, гарбуз, пюре з фіолетової капусти, чіпси з гарбуза — гарбуз дає солодку землисту основу, пюре з фіолетової капусти кислинку і антоціановий присмак.",450,"240 г","Стейк з тунця з гарбузом і пюре з фіолетової капусти. Порція 240г. Подається рожевим всередині за замовчуванням.","Уточніть у гостя яке прожарювання бажає — тунець зазвичай подається medium rare. Якщо гість не любить сирого — попередьте. До нього підійде біле вино."],[101,"Основні страви","Медальйони з тунця, кіноа та соусом Біск","Глазурований тунець, соус Біск, кіноа — соус Біск варять із панцирів ракоподібних і дає концентрований морський умамі, кіноа горіховий присмак і щільну текстуру.",250,"370 г","Медальйони з тунця з кіноа і соусом Біск. Порція 370г. Легша страва — тунець глазурований.","Якщо гість хоче рибу і щось легке серед основних — рекомендуйте. Соус Біск — морський, насичений. До нього підійде біле вино або авторський коктейль."],[102,"Основні страви","Сібас з овочевою сальсею","Сібас, овочева сальса, пряний крем-сир, кумкват, вершки, базилік, розмарин — кумкват дає кислу цитрусову гіркуватість, пряний крем-сир гостру молочну ноту до ніжного сібаса.",470,"160 г","Сібас з овочевою сальсою, пряним крем-сиром і кумкватом. Порція 160г. Невелика але дуже виразна страва.","Порція 160г — попередьте гостя якщо у нього хороший апетит. Краще разом із закускою або салатом. До нього рекомендуйте біле або ігристе вино."],[103,"Основні страви","Качине філе по-гімалайськи","Качине філе, карамелізована груша, сир дорблю, апельсин — карамелізована груша дає фруктову солодкість, Дорблю різку пліснявову гостроту, апельсин цитрусовий аромат.",380,"320 г","Качине філе по-гімалайськи з карамелізованою грушею, сиром дорблю і апельсином. Порція 320г.","Питайте чи гість їсть блакитний сир — Дорблю тут є. Качка подається medium, уточніть якщо гість хоче інакше. До неї рекомендуйте червоне вино."],[104,"Основні страви","Качине філе та пюре з батату","Качине філе, пюре з батату, слива, сливовий соус — батат дає солодку земляну основу пюре, сливовий соус кислу фруктову ноту в контраст до жирної качки.",480,"225 г","Качине філе з пікантним пюре з батату і сливовим соусом. Порція 225г. Незвичне поєднання — батат солодкий, слива кисла.","Якщо гість любить качку або хоче щось нестандартне — рекомендуйте. Уточніть яке прожарювання бажане. До неї підійде червоне вино або авторський коктейль."],[105,"Основні страви","Боул з качкою та шиїтаке","Качине філе, гриби шиїтаке, мікс салату, апельсин, маринована селера, цитрусовий соус — шиїтаке дають деревний умамі, апельсин і цитрусовий соус солодку кислотність що знімає жирність качки.",350,"265 г","Боул з качиним філе, грибами шиїтаке, апельсином і цитрусовим соусом. Порція 265г. Легкий формат.","Якщо гість хоче качку але у легшому форматі ніж основна страва — рекомендуйте боул. До нього підійде біле вино або авторський коктейль."],[106,"Основні страви","Медальйони зі свинини","Свиняча вирізка, мус з коренеплодів, малиновий соус Деміглас, вершки, часник, тим'ян — малиновий Деміглас дає ягідну кислинку на тлі насиченого м'ясного соусу, тим'ян пряну ноту.",390,"345 г","Медальйони зі свинячої вирізки з малиновим соусом Деміглас і мусом з коренеплодів. Порція 345г.","Якщо гість хоче свинину але у вишуканому виконанні — рекомендуйте. Малиновий Деміглас незвичний — поясніть що це насичений м'ясний соус з ягідною кислинкою. До нього підійде червоне вино."],[107,"Основні страви","Запечені ребра з картоплею","Свинні ребра, соєво-медова глазур, томатний соус, печена картопля, сметана, цибуля — соєво-медова глазур карамелізується при запіканні і дає хрустку солодко-солону скоринку на ребрах.",460,"420 г","Запечені свинні ребра в соєво-медовій глазурі з томатним соусом і печеною картоплею. Порція 420г. Їдять руками, дуже ситно.","Якщо гість хоче щось ситне і неформальне — це одна з найсмачніших страв меню. Попередьте що їдять руками — принесіть вологі серветки. До ребер відмінно підходить наше пиво або фірмові настоянки."],[108,"Основні страви","Запечена яловичина з картопляним гратеном","Томлена яловичина, овочевий соус, картопляний гратен, бекон — тривале томління розщеплює колаген яловичини і дає желатинову насиченість соусу і ніжність м'яса.",510,"280 г","Томлена яловичина з картопляним гратеном і беконом в овочевому соусі. Порція 280г. М'ясо розпадається — дуже тривале приготування.","Якщо гість питає яловичину і хоче щось м'яке без стейку — рекомендуйте. Поясніть що м'ясо тушковане і не жується — воно тане. До нього підійде червоне вино."],[109,"Основні страви","Каре яловичини з грибним кремом","Каре яловичини, картопляне пюре, грибний крем, пюре з фіолетової капусти, кінза, розмарин — ерінги дають м'ясисту щільну текстуру і горіховий присмак, Деміглас концентрований темний м'ясний соус.",590,"280 г","Каре яловичини з картопляним пюре, грибним кремом і пюре з фіолетової капусти. Порція 280г. Преміальна позиція.","Запитайте яке прожарювання бажане. Якщо гість хоче найкращу яловичу страву в меню — це вона. До неї рекомендуйте найкраще червоне вино з вашої карти."],[110,"Основні страви","Біфштекс з деруном","Рублена яловичина, картопляний дерун, куряче яйце, мус з ферментованого часнику, мікс салату з овочами — мус з ферментованого часнику дає м'яку солодкувату ноту без різкості, дерун хрустку картопляну основу.",390,"370 г","Біфштекс з рубленої яловичини з картопляним деруном і яйцем. Мус з ферментованого часнику. Порція 370г.","Якщо гість хоче яловичину але не стейк — рекомендуйте. Рублене м'ясо — добре прожарується, немає питань про ступінь. До нього підійде червоне вино або наші настоянки."],[111,"Основні страви","Філе-міньйон з ерінгами","Яловича вирізка, картопляне пюре, гриб ерінг, помідор черрі, соус Деміглас — ерінги дають горіхову щільність поруч із ніжною вирізкою, Деміглас концентрований темний м'ясний соус.",750,"360 г","Філе-міньйон з картопляним пюре, грибами ерінг і соусом Деміглас. Порція 360г. Найніжніша частина яловичої вирізки.","Обов'язково питайте яке прожарювання — це принципово для міньйона. Якщо гість не знає — рекомендуйте medium. До нього рекомендуйте найкраще червоне вино з вашої карти."],[112,"Основні страви","Філе міньйон з гратеном","Яловичина, соус Деміглас, картопляний гратен, стручкова квасоля, винний соус — гратен вбирає вершки і дає соковиту шаровість, винний соус кислу ноту до квасолі.",790,"440 г","Філе міньйон з соусом Деміглас, картопляним гратеном і стручковою квасолею у винному соусі. Порція 440г. Більша версія міньйона з більш складним гарніром.","Запитайте яке прожарювання. Якщо гість хоче більше ніж базовий міньйон — це повна версія страви. До нього рекомендуйте найкраще червоне вино."],[113,"Основні страви","Стейк «Нью-Йорк»","Локальна яловичина, пряне масло — стрип-стейк з вираженим м'ясним смаком і мінімальним мармуруванням. Ціна за 100 г.",350,"100 г","Стейк Нью-Йорк з локальної яловичини. Ціна за 100г. Стрип-стейк — виражений смак, менш мармурований ніж Рібай.","Обов'язково питайте прожарювання. Уточніть вагу — зазвичай беруть 250-350г. Порівняно з Рібаєм — менш жирний, більш виражений м'ясний смак. До нього червоне вино."],[114,"Основні страви","Стейк «Рібай»","Локальна яловичина, пряне масло — висока мармуровість дає жирну соковитість і насичений смак при будь-якому ступені прожарювання. Ціна за 100 г.",350,"100 г","Стейк Рібай з локальної яловичини. Ціна за 100г. Найбільш мармурований стейк — жирний, соковитий.","Обов'язково питайте прожарювання. Пояснюйте різницю гостям: Рібай жирніший і соковитіший за Нью-Йорк. Рекомендуйте medium або medium rare. До нього — найкраще червоне вино."],[115,"Основні страви","Стейк «Т-Боун»","Яловичина — тендерлойн біля кістки ніжний, стріплойн насичений і жирний: два різних смаки в одному стейку. Ціна за 100 г.",290,"100 г","Стейк Т-Боун. Ціна за 100г. На одній кістці два види м'яса — тендерлойн і стріплойн. Велика страва.","Обов'язково питайте прожарювання. Пояснюйте що по різні боки кістки м'ясо різне на смак. Зазвичай беруть від 500г. До нього рекомендуйте червоне вино."],[116,"Основні страви","Стейк «Томагавк»","Яловичина — велике ребро зберігає смак кісткового мозку, велика маса м'яса дає стабільну соковитість. Ціна за 100 г.",300,"100 г","Стейк Томагавк. Ціна за 100г. Великий стейк з довгим ребром. Подається ефектно — привертає увагу.","Попередьте що страва велика і ефектна — її виносять помітно. Зазвичай беруть на двох. Обов'язково питайте прожарювання. До нього рекомендуйте найкраще червоне вино."],[117,"Основні страви","Індичка з гарбузовим пюре та вишневим соусом","Медальйони з індички, гарбузове пюре, вишневий соус — гарбуз дає солодку кремову основу пюре, вишневий соус ягідну кислинку що балансує ніжну індичку.",410,"260 г","Медальйони з індички з гарбузовим пюре і вишневим соусом. Порція 260г. Легша за яловичину і свинину.","Якщо гість хоче м'ясо але щось легше — рекомендуйте індичку. Вишневий соус солодко-кислий, питайте чи підходить. До неї підійде біле або рожеве вино."],[118,"Основні страви","Боул з тунцем та рисом Басматі","Тунець, рис Басматі, мариноване яйце, редис, помідори черрі, маринована селера, мікс салату, боби едамаме, соус Понзу — едамаме дають рослинний протеїн і солодкість, соус Понзу цитрусову кислоту і соєву глибину.",340,"370 г","Боул з тунцем і рисом Басматі — мариноване яйце, редис, едамаме, помідори черрі і соус Понзу. Порція 370г. Японський стиль.","Якщо гість хоче щось легке і сучасне або питає японську кухню — рекомендуйте. До нього підійде біле вино або авторський коктейль."],[119,"Основні страви","Боул з креветками, кальмаром та кіноа","Кіноа, креветки, кальмар, маринована селера, помідори черрі, огірок, кукурудза, редис, цитрусовий соус — кіноа дає горіховий присмак і щільну текстуру, цитрусовий соус кислотність що підкреслює морепродукти.",360,"315 г","Боул з креветками і кальмаром на кіноа з овочами і цитрусовим соусом. Порція 315г. Легкий морський боул.","Якщо гість хоче морепродукти у легкому форматі або щось без глютену серед основних — рекомендуйте. До нього підійде біле вино або авторський коктейль."],[120,"Основні страви","Картопляні деруни під вершково-грибним соусом","Картопля, грибний соус, вершки, сир — картопля при смаженні дає хрустку скоринку, вершки в соусі жирну кремову м'якість.",320,"260 г","Картопляні деруни з вершково-грибним соусом і вершками. Порція 260г. Хрустка скоринка, соковита середина.","Якщо гість хоче щось традиційне без м'яса або просить вегетаріанське серед основних — рекомендуйте. До дерунів добре підходять наші фірмові настоянки."],[121,"Десерти","Сирники","Сирники, сметана, згущене молоко, журавлиний соус — журавлина дає ягідну кислинку що балансує солодкість сирників, сметана кислу молочну свіжість.",210,"225 г","Сирники з журавлиним соусом, згущеним молоком і сметаною. Порція 225г. Подаються теплими.","Якщо гість питає щось традиційне або не дуже солодке на десерт — рекомендуйте. До них добре підійде чай або авторський коктейль на ягідній основі."],[122,"Десерти","Шоколадний фондан з морозивом","Чорний шоколад, вершкове масло, яйце, борошно, морозиво Пломбір, печиво, какао — шоколад з високим вмістом какао дає гірку насиченість, рідка середина утворюється завдяки короткому запіканню.",290,"150 г","Шоколадний фондан — при розрізанні витікає рідкий шоколад. Подається з кулькою пломбіру. Порція 150г.","Попередьте гостя що всередині рідкий шоколад — потрібно розрізати одразу. Якщо гість любить шоколад — це найкращий вибір серед десертів. До нього добре підійде кава або авторський коктейль."],[123,"Десерти","Бельгійські вафлі","Вафлі, джем, карамельний топінг, згущене молоко, цукрова пудра — карамельний топінг дає солодку в'язкість, згущене молоко молочну жирну глибину.",150,"115 г","Бельгійські вафлі з карамельним топінгом і згущеним молоком. Порція 115г. Хрусткі зовні, м'які всередині.","Якщо гість питає щось просте і знайоме або замовляє для дитини — рекомендуйте. До вафель підійде кава або чай."],[124,"Десерти","Медівник","Сметана, мед, яйце, цукор, вершкове масло, борошно, ванільний цукор — мед карамелізується в тісті і дає глибоку солодкість, сметана в крему дає легку кислинку між шарами.",170,"150 г","Медівник шарований з вершковим кремом на сметані. Порція 150г. Не надто солодкий, медовий смак.","Якщо гість не хоче занадто солодкого або питає щось традиційне — рекомендуйте. До нього підійде чай або кава."],[125,"Десерти","Панакота із сезонною ягодою","Вершки, молоко, сметана, ягідний соус, сезонні фрукти — ягідний соус дає кислинку що контрастує з молочною солодкістю панакоти.",115,"135 г","Панакота з ягідним соусом і сезонними фруктами. Порція 135г. Найлегший десерт меню.","Якщо гість хоче щось легке після важкої їжі або каже що не дуже голодний на десерт — рекомендуйте. До неї підійде ігристе вино або авторський коктейль."],[126,"Десерти","Крем-брюле","Вершки, яйця, цукор, м'ята, сезонна ягода — цукор карамелізується пальником до хрусткої скоринки, під нею холодний ванільний крем із жовтками.",190,"150 г","Крем-брюле з карамельною скоринкою і ягодою. Порція 150г. Класика французького десерту — хрустка скоринка при ударі ложкою.","Якщо гість любить класику або цікавиться французькою кухнею — рекомендуйте. Поясніть що скоринка карамелізована безпосередньо перед подачею. До нього підійде кава або авторський коктейль."],[127,"Десерти","Чизкейк з сорбетом","Чизкейк, сорбет в асортименті — вершковий сир дає щільну молочну кислинку, сорбет фруктовий кислий контраст до жирного чизкейку.",250,"250 г","Чизкейк з сорбетом в асортименті. Порція 250г. Щільний вершковий чизкейк і освіжаючий сорбет.","Якщо гість хоче щось і кремове і свіже одночасно — рекомендуйте. Уточніть який сорбет є сьогодні. До нього підійде кава або авторський коктейль."],[128,"Десерти","Шоколадне тістечко «Говерла»","Шоколадний бісквіт, шоколадний крем, вишневе компоте — вишневе компоте дає ягідну кислинку що розкриває гіркоту шоколадного крему.",190,"195 г","Шоколадне тістечко Говерла — шоколадний бісквіт з кремом і вишневим компоте. Порція 195г.","Якщо гість хоче шоколадний десерт але без рідкої середини — рекомендуйте замість фондана. До нього підійде кава або авторський коктейль."],[129,"Десерти","Манго-кокосовий тарт","Тарт, манго компоте, кокосова панакота — манго дає тропічну солодку кислинку, кокосова панакота жирну екзотичну молочність.",160,"150 г","Манго-кокосовий тарт — тарт з манговим компоте і кокосовою панакотою. Порція 150г. Тропічний смак.","Якщо гість хоче щось незвичне або легке — рекомендуйте. Нагадайте що смак тропічний. До нього підійде ігристе вино або авторський коктейль."],[130,"Десерти","Меренговий рулет","Меренга, сезонна ягода, м'ята — меренга тримає хрустку зовнішність і тягучу середину, ягоди дають кислинку до солодкої повітряності.",250,"280 г","Меренговий рулет з сезонними ягодами і м'ятою. Порція 280г. Повітряний, легкий десерт.","Якщо гість хоче щось не дуже важке і красиве на вигляд — рекомендуйте. До нього підійде ігристе вино або авторський коктейль."],[131,"Десерти","Десерт від Шефа: Гарбузові палюшки з маковим кремом","Гарбузові палюшки, манго компоте, крем із сиру, сметани та маку, гарбузові чіпси, карамелізоване насіння — гарбуз дає солодку земляну основу, мак у крему горіхову гіркуватість, манго тропічну кислинку.",270,"290 г","Гарбузові палюшки від Шефа — теплі, з маковим кремом, манговим компоте і хрусткими чипсами. Порція 290г. Подається теплим.","Авторський десерт — якщо гість хоче щось нестандартне або питає що рекомендуєте — це перший варіант. Нагадайте що подається теплим. До нього підійде кава або авторський коктейль."],[132,"Дитяче меню","Смажені котлетки з овочами","Куряче філе, помідор, огірок, мікрогрін — куряче філе при смаженні дає хрустку скоринку і зберігає сік усередині.",180,"200 г","Смажені курячі котлетки зі свіжими овочами і мікрогріном. Порція 200г. Хрустка скоринка, соковиті всередині.","Найпопулярніша позиція дитячого меню. Якщо батьки не знають що взяти для дитини — рекомендуйте цю. Без гострого і без алергенів крім курки."],[133,"Дитяче меню","Парові котлетки з овочами","Курячий фарш, вершки, помідор, огірок, мікрогрін — парова обробка зберігає весь сік, вершки дають ніжну кремову текстуру.",180,"230 г","Парові курячі котлетки з вершками і свіжими овочами. Порція 230г. М'які, без смаженого.","Якщо батьки просять щось легке або без смаженого для маленьких дітей — рекомендуйте. М'якша текстура ніж у смажених."],[134,"Дитяче меню","Курячий шашличок","Куряче філе, огірок, помідор, копчена паприка, мікрогрін — копчена паприка дає легкий димний аромат без гостроти.",190,"210 г","Курячий шашличок з копченою паприкою, огірком і помідором. Порція 210г. Подається на шпажці.","Дітям подобається подача на шпажці. Якщо дитина вже старша і любить м'ясо — рекомендуйте. Без гострого."],[135,"Дитяче меню","Нагетси","Куряче філе, панірувальні сухарі, куряче яйце, кетчуп — хрустка паніровка при смаженні ізолює сік філе і дає контраст текстур.",120,"230 г","Нагетси з курячого філе в панірувальних сухарях з кетчупом. Порція 230г. Класика для дітей.","Якщо дитина примхлива або не хоче нічого нестандартного — це безпечний вибір. Уточніть у батьків чи немає алергії на яйця."],[136,"Дитяче меню","Стейк з лосося","Філе лосося, огірок, помідор, мікрогрін — лосось дає м'який ненасичений рибний смак без різкості.",370,"180 г","Стейк з лосося зі свіжими овочами і мікрогріном. Порція 180г. М'який ненасичений рибний смак.","Якщо батьки хочуть дати дитині рибу і дитина її їсть — рекомендуйте. Лосось без різкого рибного запаху."],[137,"Дитяче меню","Овочевий супчик","Курячий бульйон, кабачок, морква, болгарський перець, броколі, цвітна капуста — броколі і цвітна капуста зберігають легку рослинну гіркуватість, бульйон дає ніжну основу.",110,"320 г","Овочевий супчик на курячому бульйоні з кабачком, морквою, броколі і цвітною капустою. Порція 320г.","Якщо батьки просять щось легке для дитини або дитина не хоче основної страви — рекомендуйте суп. Без м'яса, тільки бульйон і овочі."],[138,"Дитяче меню","Овочевий супчик з фрикадельками","Курячий бульйон, макарони, курячі фрикадельки — фрикадельки дають ніжний м'ясний смак, макарони вбирають бульйон.",170,"300 г","Овочевий супчик з фрикадельками і макаронами на курячому бульйоні. Порція 300г.","Якщо дитина їсть м'ясо і батьки хочуть суп — рекомендуйте цей варіант. Ситніший за звичайний овочевий."],[139,"Дитяче меню","Сирна паста","Кольорова паста, вершки, моцарела, пармезан, мікрогрін — моцарела при нагріванні тягнеться, пармезан дає солону глибину, вершки кремову текстуру.",130,"220 г","Кольорова паста з вершковим соусом, моцарелою і пармезаном. Порція 220г.","Кольорова паста привертає увагу дітей. Якщо дитина любить пасту і сир — рекомендуйте. Без м'яса."],[140,"Дитяче меню","Спагетті","Паста, вершкове масло, мікрогрін — вершкове масло покриває пасту і дає ніжну жирну ноту без додаткових смаків.",60,"150 г","Спагетті з вершковим маслом і мікрогріном. Порція 150г. Найпростіша позиція дитячого меню.","Якщо дитина дуже примхлива або не хоче нічого нового — це найбезпечніший вибір. Без будь-яких соусів."],[141,"Дитяче меню","Картопляне пюре","Картопля, вершки, вершкове масло, мікрогрін — вершки і масло дають пюре жирну шовковисту текстуру і м'який молочний смак.",110,"150 г","Картопляне пюре з вершками і вершковим маслом. Порція 150г. Класичний гарнір.","Пропонуйте як гарнір до котлеток або шашличку. Можна замовити окремо якщо дитина їсть тільки пюре."],[142,"Дитяче меню","Гречка","Гречка, вершкове масло, мікрогрін — гречка при варінні дає горіховий присмак і щільну текстуру, масло жирну округлість.",60,"150 г","Гречка з вершковим маслом і мікрогріном. Порція 150г.","Пропонуйте як гарнір до котлеток або основної страви дитячого меню."],[143,"Дитяче меню","Рис","Рис, вершкове масло, мікрогрін — вершкове масло дає рису жирну ніжність і перешкоджає злипанню зерен.",60,"150 г","Рис з вершковим маслом і мікрогріном. Порція 150г.","Пропонуйте як гарнір. Якщо батьки просять щось нейтральне і легке — це найпростіший варіант."],[144,"Фреші","Апельсиновий фреш","Свіжовіджатий апельсиновий сік — без пастеризації зберігає всі ефірні олії цедри і ферменти апельсину. 250 мл.",160,"250 мл","Свіжовіджатий апельсиновий сік. 250мл. Готується одразу після замовлення.","Пропонуйте на початку трапези або якщо гість просить щось без алкоголю. Нагадайте що свіжовіджатий — не пакетований."],[145,"Фреші","Апельсиново-грейпфрутовий фреш","Свіжовіджатий апельсин і грейпфрут — грейпфрут дає гіркуватий присмак, апельсин солодку кислотність, разом балансують одне одного. 250 мл.",170,"250 мл","Суміш апельсина і грейпфруту свіжовіджата. 250м
